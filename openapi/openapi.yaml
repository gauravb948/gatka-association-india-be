      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NationalPaymentConfigResponse" }
        "404":
          description: Row not created yet (run seed/migration or PUT once)
    put:
      security: [{ bearerAuth: [] }]
      summary: Upsert national Razorpay keys and webhook secret (national admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StatePaymentConfigPut" }
      responses:
        "200":
          description: Upserted (response omits secrets)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NationalPaymentConfigPutResponse" }
  /payments/state-config:
