  /users/{userId}/password:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Set password for another user (hierarchy admins)
      description: >
        Allowed for `NATIONAL_ADMIN`, `STATE_ADMIN`, `DISTRICT_ADMIN`, and `TRAINING_CENTER`.
        Target must be a strictly lower role under the same geographic rules as user directory
        (national admin may reset everyone except other national admins;
        state admin may reset district admins and below in that state; TC may reset players/coaches at that TC).
        You cannot reset your own password here — use OTP or other self-service flows.
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HierarchyPasswordResetRequest" }
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/HierarchyPasswordResetResponse" }
        "400":
          description: Missing userId or invalid password / attempted self-reset
        "403":
          description: Forbidden role, target role, or user outside geographic scope
        "404":
          description: Target user not found
  /users/{id}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get a user by id (self or hierarchy-scoped access)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/LoginUser" }
                  userTypeProfile:
                    description: Role-specific profile/registration payload; null when not applicable.
                    nullable: true
                    additionalProperties: true
        "403":
          description: Forbidden
        "404":
          description: User not found
  /dashboard/stats:
    get:
      security: [{ bearerAuth: [] }]
      summary: Dashboard summary counts (scope by signed-in admin)
      description: >
        National admin sees all-India figures. State admin is limited to their state (including
        `StateRegistration` fallback when `User.stateId` is unset). District admin is limited to their
        district. Training center sees their center only. `totalStates` is set only for national admin
        (enabled states). `totalDistricts` counts enabled districts only. `totalUsers`, `players`, and
        tournament registration counts include only users with `EntityStatus` ACCEPTED and `isActive` true.
        `ageGroups` and `eventGroups` are global active catalog counts. `competitions` counts only
        competitions visible to the user (same rules as `GET /competitions/me`) that are not closed
        (`isClosed` false). Tournament registrations are further limited to those whose player account
        is ACCEPTED and active.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data:
                    $ref: "#/components/schemas/DashboardStatsResponse"
        "403":
          description: Forbidden (role not allowed or hierarchy context missing)
  /dashboard/overview:
    get:
      security: [{ bearerAuth: [] }]
      summary: Dashboard summary cards (scope by signed-in admin)
      description: >
        Returns the four home-dashboard card counts scoped to the signed-in admin hierarchy.
        National admin sees all-India figures. State admin is limited to their state (including
        users linked via district or training center under that state). District admin is limited
        to their district. Training center admin sees counts for their center (coaches/referees/users)
        and pending district registrations for their district. `activeCoaches` counts accepted,
        active coaches. `refereesCertified` counts accepted, active, non-blacklisted referees.
        `trainingCenters` counts accepted, enabled training center entities. `pendingApprovals`
        is the sum of all users in `SUBMITTED` status plus district registrations in `SUBMITTED`
        status within scope.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverviewResponse"
        "403":
          description: Forbidden (role not allowed or hierarchy context missing)
  /domains/public/by-domain-name:
    get:
      summary: Resolve state by domain hostname (public)
      description: >
        Looks up the configured state for a web domain. Accepts hostname only (example
        `pb.dummy.gatka.in`); optional `http://` / `https://` prefix and trailing slashes are
        stripped. Comparison is case-insensitive.
      parameters:
        - in: query
          name: domainName
          required: true
          schema: { type: string }
          description: Domain hostname (example `pb.dummy.gatka.in`).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateDomain"
        "400":
          description: Invalid domainName
        "404":
          description: No state configured for this domain
  /domains:
    get:
      security: [{ bearerAuth: [] }]
      summary: List state domains (national admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/StateDomain" }
        "403":
          description: Forbidden (NATIONAL_ADMIN only)
  /domains/{stateId}:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update state domain by state id (national admin)
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StateDomainPatch" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/StateDomain" }
        "404":
          description: State not found
        "409":
          description: Domain already assigned to another state
  /reports/competition-registrations:
    get:
      security: [{ bearerAuth: [] }]
      summary: Competition registration counts by gender and age band
      description: >
        Paginated summary per competition with distinct participant counts from
        `ParticipationRecord` (where `participated` is true). Age band comes from the
        event's `AgeCategory.bandType` — SUB_JUNIOR/JUNIOR map to boys/girls,
        SENIOR/VETERAN/OPEN map to men/women. Scoped to the caller's admin hierarchy.
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
        - in: query
          name: search
          schema: { type: string }
          description: Case-insensitive substring match on competition name
        - in: query
          name: competitionId
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompetitionRegistrationsReportResponse" }
        "401":
          description: Unauthorized
        "403":
          description: Forbidden for this role
  /reports/competition-event-registrations:
    get:
      security: [{ bearerAuth: [] }]
      summary: Event registration counts grouped by event group
      description: >
        Returns catalog events in each event group for the competition's age scope,
        with distinct `playersRegistered` counts from `ParticipationRecord` rows where
        `participated` is true. Optional `stateId`, `districtId`, and `gender` filters
        narrow players; caller hierarchy scope always applies. Training center, district,
        state, and national admins only.
      parameters:
        - $ref: "#/components/parameters/competitionReportCompetitionId"
        - $ref: "#/components/parameters/competitionReportStateId"
        - $ref: "#/components/parameters/competitionReportDistrictId"
        - $ref: "#/components/parameters/competitionReportGender"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompetitionEventRegistrationReport" }
        "401":
          description: Unauthorized
        "403":
          description: Forbidden for this role
        "404":
          description: Competition not found
  /reports/competition-event-group-participants:
    get:
      security: [{ bearerAuth: [] }]
      summary: Participants grouped by event group
      description: >
        Returns player profile details for each event group in the competition's age
        scope. Each player appears once per group with `participatingIn` listing event
        names they are registered for in that group. Optional `stateId`, `districtId`,
        and `gender` filters narrow players; caller hierarchy scope always applies.
      parameters:
        - $ref: "#/components/parameters/competitionReportCompetitionId"
        - $ref: "#/components/parameters/competitionReportStateId"
        - $ref: "#/components/parameters/competitionReportDistrictId"
        - $ref: "#/components/parameters/competitionReportGender"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompetitionEventGroupParticipantsReport" }
        "401":
          description: Unauthorized
        "403":
          description: Forbidden for this role
        "404":
          description: Competition not found
  /reports/competition-age-wise:
    get:
      security: [{ bearerAuth: [] }]
      summary: Age-wise registration counts by event type
      description: >
        Returns distinct player counts per geographic unit, age group, and predefined
        event column (`teamDemo`, `teamFariSoti`, `teamSingleSoti`, `indvDemo`,
        `indvFariSoti`, `indvSingleSoti`). Grouping follows competition level:
        `DISTRICT` → training center name, `STATE` → district name, `NATIONAL` → state
        name. `district` on each row is the total distinct players in that age group for
        that unit. Age group keys use `U{ageTo+1}` (e.g. Under 19 Years → `U19`).
        Requires `gender`. Caller hierarchy scope always applies.
      parameters:
        - $ref: "#/components/parameters/competitionReportCompetitionId"
        - $ref: "#/components/parameters/competitionReportGenderRequired"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompetitionAgeWiseReport" }
        "401":
          description: Unauthorized
        "403":
          description: Forbidden for this role
        "404":
          description: Competition not found
