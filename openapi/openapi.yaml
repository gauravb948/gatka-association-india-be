        fbUrl: { type: string, format: uri, nullable: true }
        ytUrl: { type: string, format: uri, nullable: true }
        instaUrl: { type: string, format: uri, nullable: true }
        address: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        state:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            code: { type: string }
    AboutUsCreate:
      type: object
      required: [stateId, logoUrl, stateTitle]
      properties:
        stateId: { type: string }
        logoUrl: { type: string, format: uri }
        stateTitle: { type: string }
        stateTitleNative: { type: string, nullable: true }
        phoneNo: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        fbUrl: { type: string, format: uri, nullable: true }
        ytUrl: { type: string, format: uri, nullable: true }
        instaUrl: { type: string, format: uri, nullable: true }
        address: { type: string, nullable: true }
    AboutUsPatch:
      type: object
      properties:
        stateId: { type: string }
        logoUrl: { type: string, format: uri }
        stateTitle: { type: string }
        stateTitleNative: { type: string, nullable: true }
        phoneNo: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        fbUrl: { type: string, format: uri, nullable: true }
        ytUrl: { type: string, format: uri, nullable: true }
        instaUrl: { type: string, format: uri, nullable: true }
        address: { type: string, nullable: true }
    StateDomain:
      type: object
      required: [stateId, stateName, domainName]
      properties:
        stateId: { type: string }
        stateName: { type: string }
        domainName: { type: string }
    StateDomainPatch:
      type: object
      required: [domainName]
      properties:
        domainName:
          type: string
          description: Domain hostname only (example `pb.dummy.gatka.in`), no protocol/path.
    StatusChangeRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
    TrainingCenterStatusChangeRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACCEPTED, REJECTED, BLOCKED]
        statusReason:
          type: string
          nullable: true
          description: Required when status is REJECTED or BLOCKED
    StateRegistrationCreate:
      type: object
      required:
        [stateId, firstName, lastName, email, password, mobileNo, verificationToken, address]
      properties:
        stateId: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        mobileNo: { type: string }
        verificationToken:
          type: string
          description: Token returned by `POST /auth/otp/verify` for `REGISTRATION`.
        address: { type: string }
        passportPhotoUrl: { type: string, format: uri, nullable: true }
    DistrictRegistrationCreate:
      type: object
      required:
        [
          stateId,
          districtId,
          firstName,
          lastName,
          email,
          password,
          mobileNo,
          verificationToken,
          address,
        ]
      properties:
        stateId: { type: string, description: "Must match the district's state" }
        districtId: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        mobileNo: { type: string }
        verificationToken:
          type: string
          description: Token returned by `POST /auth/otp/verify` for `REGISTRATION`.
        address: { type: string }
        passportPhotoUrl: { type: string, format: uri, nullable: true }
    StateRegistration:
      type: object
      description: Password is stored only on the linked User account, not on this row
      properties:
        id: { type: string }
        stateId: { type: string }
        userId: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        state:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            code: { type: string }
            isEnabled: { type: boolean }
        user:
          allOf:
            - $ref: "#/components/schemas/RegistrationApplicantUser"
          nullable: true
    RegistrationPaymentSummary:
      type: object
      description: Non-sensitive payment row linked to a registration
      properties:
        id: { type: string }
        purpose: { type: string }
        amountPaise: { type: integer }
        currency: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DistrictRegistrationNestedSummary:
      description: District-body registration nested under a state’s district (no nested district/state)
      type: object
      properties:
        id: { type: string }
        districtId: { type: string }
        stateId: { type: string }
        userId: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DistrictWithOptionalDistrictRegistration:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        isEnabled: { type: boolean }
        registration:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/DistrictRegistrationNestedSummary"
    StateWithDistrictRegistrations:
      description: State with ordered districts; each district may include its body registration
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string }
        isEnabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        districts:
          type: array
          items: { $ref: "#/components/schemas/DistrictWithOptionalDistrictRegistration" }
    StateBodyRegistrationSnapshot:
      description: Parent state’s own body registration (`State.registration`), when present
      type: object
      properties:
        id: { type: string }
        stateId: { type: string }
        userId: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        user:
          allOf:
            - $ref: "#/components/schemas/RegistrationApplicantUser"
          nullable: true
    StateWithStateBodyRegistration:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string }
        isEnabled: { type: boolean }
        registration:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/StateBodyRegistrationSnapshot"
    StateRegistrationDetail:
      description: >
        `GET /state-registrations/state/{stateId}` includes optional `payment`, applicant `user`,
        and `state` with all `districts` (each may include `registration` for the district body).
      allOf:
        - $ref: "#/components/schemas/StateRegistration"
        - type: object
          properties:
            payment:
              nullable: true
              $ref: "#/components/schemas/RegistrationPaymentSummary"
            state:
              nullable: true
              $ref: "#/components/schemas/StateWithDistrictRegistrations"
    DistrictRegistrationDetail:
      description: >
        `GET /district-registrations/district/{districtId}` includes optional `payment`, applicant `user`,
        and `state.registration` for the parent state’s body registration when present.
      allOf:
        - $ref: "#/components/schemas/DistrictRegistration"
        - type: object
          properties:
            payment:
              nullable: true
              $ref: "#/components/schemas/RegistrationPaymentSummary"
            state:
              nullable: true
              $ref: "#/components/schemas/StateWithStateBodyRegistration"
    StateRegistrationListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/StateRegistration" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    DistrictRegistration:
      type: object
      description: Password is stored only on the linked User account, not on this row
      properties:
        id: { type: string }
        stateId: { type: string }
        districtId: { type: string }
        userId: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        state:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            code: { type: string }
            isEnabled: { type: boolean }
        district:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            stateId: { type: string }
            isEnabled: { type: boolean }
        user:
          allOf:
            - $ref: "#/components/schemas/RegistrationApplicantUser"
          nullable: true
    DistrictRegistrationListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/DistrictRegistration" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: JWT and full user context for the client (no password)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /auth/me:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get current user by token (fresh DB snapshot)
      responses:
        "200":
          description: OK (envelope wraps this payload in `data`)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      user: { $ref: "#/components/schemas/LoginUser" }
  /auth/me/profile:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update current user profile (self-service)
      description: >
        Patches `User.email` / `User.phone` and/or one role-specific profile block.
        Only the subsection matching your role is accepted. For STATE_ADMIN / DISTRICT_ADMIN,
        updating `mobileNo` also updates the linked user `phone`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMyProfileRequest"
      responses:
        "200":
          description: OK (envelope wraps this payload in `data`)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      user: { $ref: "#/components/schemas/LoginUser" }
        "400":
          description: Invalid body or wrong profile section for role
        "404":
          description: State or district registration row missing for admin user
        "409":
          description: Email already in use
  /auth/register/player:
    post:
      summary: Self-register player (pending payment until webhook)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPlayerRequest"
      responses:
        "201":
          description: Created
  /auth/register/coach:
    post:
      summary: Self-register coach (pending approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCoachRequest"
      responses:
        "201":
          description: Created
  /auth/register/referee:
    post:
      summary: Self-register referee (pending approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRefereeRequest"
      responses:
        "201":
          description: Created
  /auth/register/volunteer:
    post:
      summary: Submit volunteer registration (public; no login account is created)
      description: >
        Creates a volunteer registration with status `REGISTERED`. Volunteers cannot sign in;
        district, state, and national admins view submissions via `GET /volunteer-registrations`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterVolunteerRequest"
      responses:
        "201":
          description: Registered (envelope wraps this payload in `data`)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/VolunteerRegistrationSubmitResponse" }
  /auth/register/training-center:
    post:
      summary: Register training center + login user (pending approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterTrainingCenterRequest"
      responses:
        "201":
          description: Created
  /auth/otp/request:
    post:
      summary: Request OTP for registration or password reset
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OtpRequest" }
      responses:
        "200":
          description: OK
  /auth/otp/verify:
    post:
      summary: Verify OTP and get verification token
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OtpVerify" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/OtpVerifyResponse" }
  /auth/otp/confirm:
    post:
      summary: Confirm OTP and set new password
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OtpConfirm" }
      responses:
        "200":
          description: OK
  /states/public:
    get:
      summary: List enabled states where state-body registration is not created yet (public, paginated)
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPublicStateListResponse"
  /states/public/registration-accepted:
    get:
      summary: List enabled states with ACCEPTED state-body registration and payment config (public, paginated)
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPublicStateListResponse"
  /states:
    get:
      security: [{ bearerAuth: [] }]
      summary: List all states (national admin, paginated)
      description: Ordered by newest state-body registration submission/activity (`StateRegistration.updatedAt` desc); states without a registration row appear after, then alphabetical by state name within each tier.
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedStateListResponse"
    post:
      security: [{ bearerAuth: [] }]
      summary: Create state (national admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StateCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/State" }
  /states/{id}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get state by id (nested relations; national admin or state admin for own state)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StateDetailResponse" }
        "403":
          description: Forbidden
        "404":
          description: State not found
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update state — enable/disable, rename (national admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StatePatch" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/State" }
  /states/{id}/payment-config:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get Razorpay config metadata for state (state admin, own state only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatePaymentConfigResponse" }
        "404":
          description: Not found
    put:
      security: [{ bearerAuth: [] }]
      summary: Upsert per-state Razorpay keys and webhook secret (state admin, own state only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StatePaymentConfigPut" }
      responses:
        "200":
          description: Upserted
  /districts/public/by-state/{stateId}/registration-accepted:
    get:
      summary: List enabled districts whose district-body registration is ACCEPTED (public, paginated)
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPublicDistrictListResponse"
  /districts/public/by-states/registration-accepted:
    post:
      summary: List districts with ACCEPTED district-body registration for multiple states (public)
      description: >
        Returns enabled districts in any of the given states whose linked `DistrictRegistration`
        status is ACCEPTED. Same filter as GET `/districts/public/by-state/{stateId}/registration-accepted`,
        but not paginated. Duplicate state ids in the body are ignored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stateIds]
              properties:
                stateIds:
                  type: array
                  minItems: 1
                  items: { type: string }
      responses:
        "200":
          description: OK — array of id, name, stateId (sorted by stateId, then name)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PublicDistrictListItem" }
  /districts/public/by-state/{stateId}:
    get:
      summary: List enabled districts for state where district registration is not created yet (public, paginated)
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPublicDistrictListResponse"
  /districts:
    post:
      security: [{ bearerAuth: [] }]
      summary: Create a single district (national/state admin)
      description: Same rules as POST `/districts/state/{stateId}`; provide `stateId` in the JSON body.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DistrictCreateWithState" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/District" }
        "403":
          description: State admin targeting another state
        "409":
          description: District name already exists in this state
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update a district (national/state admin)
      description: Same rules as PATCH `/districts/{id}`; supply the district `id` in the JSON body. At least one of `name`, `isEnabled` is required.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DistrictPatchWithId" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/District" }
        "403":
          description: State admin targeting a district outside their state
        "404":
          description: District not found
        "409":
          description: Renamed to a name that already exists in this state
  /districts/by-state/{stateId}:
    get:
      security: [{ bearerAuth: [] }]
      summary: All districts for state (national/state admin, paginated)
      description: Ordered by newest district-body registration submission/activity (`DistrictRegistration.updatedAt` desc); districts without a registration appear after, then alphabetical by district name within each tier.
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDistrictListResponse"
  /districts/state/{stateId}/bulk:
    post:
      security: [{ bearerAuth: [] }]
      summary: Bulk create districts under state (national/state admin)
      description: >
        Creates many districts in one database transaction. Fails with 409 if any name
        collides with an existing district in the same state (the whole batch rolls back).
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BulkDistrictsCreateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DistrictBulkCreateResponse" }
        "400":
          description: Invalid body or duplicate names in the request payload
        "409":
          description: A district name already exists for this state
  /districts/state/{stateId}:
    post:
      security: [{ bearerAuth: [] }]
      summary: Create district under state (national/state admin)
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DistrictCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/District" }
        "409":
          description: District name already exists in this state
  /districts/{id}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get district by id (nested relations; national, state admin in-state, or own district admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
