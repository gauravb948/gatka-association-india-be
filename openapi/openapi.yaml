openapi: 3.0.3
info:
  title: Gatka Association India API
  version: 1.0.0
  description: |
    REST API for centralized Gatka management (roles, geography, registrations, Razorpay, competitions, camps, attendance, results, notices, migration).

    **Banners:** carousel rows scoped by **state**. Public carousel **requires a state filter**: `GET /banners/public?stateId=…` or `GET /banners/public/by-state/{stateId}`. Rows have `imageUrl`, optional `title` / `subtitle`, `sortOrder`. National/state admins use `/banners/admin` (`stateId` query optional for nationals).

    **Uploads:** Cloudflare R2 — `POST /uploads/r2/upload` (multipart) and `POST /uploads/r2/presign-put` (JSON) are **public** (no JWT); protected by **rate limits**. Store returned `publicUrl` on entities (e.g. banners, registration photos).

    **Rate limiting:** per-IP limits on `/api` (and stricter limits on auth and upload presign). Exceeded limits return **429** with JSON `{ error, code: RATE_LIMITED, kind, retryAfterSec }`. Use `TRUST_PROXY=1` behind a reverse proxy.

    **Age categories:** `GET /age-categories` is **unauthenticated** (no JWT).

    **Attendance:** `POST /attendance` requires COACH, TRAINING_CENTER, or district/state/national admin.
    `GET /attendance/user/{userId}` is for the same user when `role` is PLAYER, or any user for other roles.
    `GET /attendance/competition/{competitionId}/summary` lists TOURNAMENT rows for that competition (district/state/national admin only).
    `GET /attendance/report` returns present vs absent **players** for a training center + day, a competition (optional event + day), or a camp (optional day) — same roles as marking attendance.
servers:
  - url: http://localhost:4000/api
    description: Local
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    userListPage:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    userListPageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    userListStatus:
      name: status
      in: query
      schema: { type: string }
      description: Filter by `EntityStatus`; comma-separated (e.g. `PENDING,ACCEPTED`).
    userListStateId:
      name: stateId
      in: query
      schema: { type: string }
      description: Optional geography filter (national; state/district admins only when it matches their scope).
    userListDistrictId:
      name: districtId
      in: query
      schema: { type: string }
      description: Optional district filter (national; state admin must be in-state; district admin must be own district).
    userListTrainingCenterId:
      name: trainingCenterId
      in: query
      schema: { type: string }
      description: Optional training center filter (national; state/district when TC is in scope).
    competitionReportCompetitionId:
      name: competitionId
      in: query
      required: true
      schema: { type: string }
      description: Competition primary key
    competitionReportStateId:
      name: stateId
      in: query
      schema: { type: string }
      description: Optional player geography filter (validated against caller scope)
    competitionReportDistrictId:
      name: districtId
      in: query
      schema: { type: string }
      description: Optional player geography filter (validated against caller scope)
    competitionReportGender:
      name: gender
      in: query
      schema:
        type: string
        enum: [MALE, FEMALE, BOYS, GIRLS]
      description: Optional filter on event group gender and player profile gender
    competitionReportGenderRequired:
      name: gender
      in: query
      required: true
      schema:
        type: string
        enum: [MALE, FEMALE, BOYS, GIRLS]
      description: Filter on event group gender and player profile gender
  schemas:
    Membership:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        type: { type: string, enum: [NATIONAL_ADMIN, STATE_ADMIN, DISTRICT_ADMIN, TRAINING_CENTER, COACH, REFEREE, PLAYER, VOLUNTEER] }
        validFrom: { type: string, format: date-time }
        validUntil: { type: string, format: date-time }
        status: { type: string, enum: [ACTIVE, EXPIRED] }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
    RateLimitedError:
      type: object
      properties:
        error:
          type: string
          example: Too many requests
        code:
          type: string
          example: RATE_LIMITED
        kind:
          type: string
          enum: [api, auth, upload]
        retryAfterSec:
          type: integer
    BannerStateSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string }
    Banner:
      type: object
      properties:
        id:
          type: string
        stateId:
          type: string
        state:
          $ref: "#/components/schemas/BannerStateSummary"
        imageUrl:
          type: string
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        isActive:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BannerCreate:
      type: object
      required: [stateId, imageUrl]
      properties:
        stateId:
          type: string
          description: State this carousel row belongs to. National admin may choose any state; state admin must send their own state's id.
        imageUrl:
          type: string
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        isActive:
          type: boolean
        sortOrder:
          type: integer
    BannerPatch:
      type: object
      properties:
        stateId:
          type: string
          description: Move banner to another state
        imageUrl:
          type: string
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        isActive:
          type: boolean
        sortOrder:
          type: integer
    R2PresignPutRequest:
      type: object
      required: [contentType]
      properties:
        contentType:
          type: string
          description: Allowed image MIME types (e.g. image/png, image/jpeg, image/webp, image/gif, image/svg+xml)
        prefix:
          type: string
          description: Object key prefix (default "banners")
          default: banners
    R2PresignPutResponse:
      type: object
      properties:
        key:
          type: string
        publicUrl:
          type: string
          format: uri
        uploadUrl:
          type: string
          format: uri
        expiresInSeconds:
          type: integer
    EntityStatus:
      type: string
      enum: [PENDING, SUBMITTED, ACCEPTED, REJECTED, BLOCKED]
    Gender:
      type: string
      description: OPEN is for competitions only (all player genders eligible); person profiles use MALE/FEMALE/BOYS/GIRLS.
      enum: [MALE, FEMALE, BOYS, GIRLS, OPEN]
    MaritalStatus:
      type: string
      enum: [SINGLE, MARRIED, DIVORCED, WIDOWED, SEPARATED, OTHER]
    TShirtSize:
      type: string
      enum: [XS, S, M, L, XL, XXL, XXXL]
    PlayingHand:
      type: string
      enum: [LEFT, RIGHT, BOTH]
    CoachAppliedFor:
      type: string
      enum: [SENIOR_COACH, ASSISTANT_COACH]
    GatkaExperience:
      type: string
      enum: [LT_1_YEAR, Y1_3, Y3_5, Y5_10, GT_10]
    Role:
      type: string
      enum:
        [
          NATIONAL_ADMIN,
          STATE_ADMIN,
          DISTRICT_ADMIN,
          TRAINING_CENTER,
          COACH,
          REFEREE,
          PLAYER,
          VOLUNTEER,
        ]
    ConfigurableFeeRole:
      type: string
      description: Roles that have a configurable national fee (excludes NATIONAL_ADMIN)
      enum:
        [
          STATE_ADMIN,
          DISTRICT_ADMIN,
          TRAINING_CENTER,
          COACH,
          REFEREE,
          PLAYER,
          VOLUNTEER,
        ]
    RolePaymentFeeConfig:
      type: object
      properties:
        role: { $ref: "#/components/schemas/ConfigurableFeeRole" }
        feeAmountPaise:
          type: integer
          description: Amount in paise (INR); 100 paise = 1 INR
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RolePaymentFeesPatchBody:
      type: object
      required: [fees]
      properties:
        fees:
          type: array
          minItems: 1
          items:
            type: object
            required: [role, feeAmountPaise]
            properties:
              role: { $ref: "#/components/schemas/ConfigurableFeeRole" }
              feeAmountPaise: { type: integer, minimum: 0 }
    LoginStateSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string }
        isEnabled: { type: boolean }
    LoginDistrictSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        isEnabled: { type: boolean }
        state:
          type: object
          properties:
            id: { type: string }
            isEnabled: { type: boolean }
    LoginTrainingCenterSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        registrationNumber: { type: string, nullable: true }
        isEnabled: { type: boolean }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        termsAcceptedAt: { type: string, format: date-time, nullable: true }
        district:
          type: object
          properties:
            id: { type: string }
            isEnabled: { type: boolean }
            state:
              type: object
              properties:
                id: { type: string }
                isEnabled: { type: boolean }
    LoginPlayerProfile:
      type: object
      nullable: true
      properties:
        fullName: { type: string }
        fatherName: { type: string, nullable: true }
        motherName: { type: string, nullable: true }
        aadharNumber: { type: string, nullable: true }
        maritalStatus: { $ref: "#/components/schemas/MaritalStatus", nullable: true }
        whatsappNo: { type: string, nullable: true }
        tShirtSize: { $ref: "#/components/schemas/TShirtSize", nullable: true }
        playingHand: { $ref: "#/components/schemas/PlayingHand", nullable: true }
        photoUrl: { type: string, nullable: true }
        aadharFrontUrl: { type: string, nullable: true }
        aadharBackUrl: { type: string, nullable: true }
        address: { type: string, nullable: true }
        gender: { $ref: "#/components/schemas/Gender" }
        dateOfBirth: { type: string, format: date-time }
        registrationNumber: { type: string, nullable: true }
        membershipValidFrom: { type: string, format: date-time, nullable: true }
        membershipValidUntil: { type: string, format: date-time, nullable: true }
        registrationStatus: { type: string }
        documentsVerifiedAt: { type: string, format: date-time, nullable: true }
        isBlacklisted: { type: boolean }
        stateId: { type: string }
        districtId: { type: string }
        trainingCenterId: { type: string }
        dateOfJoining: { type: string, format: date-time }
        termsAcceptedAt: { type: string, format: date-time, nullable: true }
    EligiblePlayerSummary:
      type: object
      description: Active players eligible for this competition; includes profile image and nested geo names
      properties:
        userId: { type: string }
        fullName: { type: string }
        gender: { $ref: "#/components/schemas/Gender" }
        registrationNumber: { type: string }
        stateId: { type: string }
        districtId: { type: string }
        trainingCenterId: { type: string }
        photoUrl: { type: string, nullable: true, description: Player profile image URL }
        state:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
            code: { type: string }
        district:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
        trainingCenter:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
        participatingIn:
          type: array
          description: Other catalog events in this competition the player is already registered for
          items:
            type: object
            properties:
              eventId: { type: string }
              eventName: { type: string }
    LoginCoachProfile:
      type: object
      nullable: true
      properties:
        registrationNumber: { type: string, nullable: true }
        fullName: { type: string }
        fatherName: { type: string, nullable: true }
        aadharNumber: { type: string, nullable: true }
        address: { type: string, nullable: true }
        education: { type: string, nullable: true }
        photoUrl: { type: string, nullable: true }
        aadharFrontUrl: { type: string, nullable: true }
        aadharBackUrl: { type: string, nullable: true }
        gender: { $ref: "#/components/schemas/Gender" }
        appliedFor: { $ref: "#/components/schemas/CoachAppliedFor", nullable: true }
        experienceInGatka: { $ref: "#/components/schemas/GatkaExperience", nullable: true }
        membershipValidUntil: { type: string, format: date-time, nullable: true }
        trainingCenterId: { type: string }
        isBlacklisted: { type: boolean }
        termsAcceptedAt: { type: string, format: date-time, nullable: true }
    LoginRefereeProfile:
      type: object
      nullable: true
      properties:
        registrationNumber: { type: string, nullable: true }
        fullName: { type: string }
        fatherName: { type: string, nullable: true }
        aadharNumber: { type: string, nullable: true }
        alternatePhone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        appliedFor: { type: string, nullable: true }
        education: { type: string, nullable: true }
        experienceInGatka: { $ref: "#/components/schemas/GatkaExperience", nullable: true }
        photoUrl: { type: string, nullable: true }
        aadharFrontUrl: { type: string, nullable: true }
        aadharBackUrl: { type: string, nullable: true }
        gender: { $ref: "#/components/schemas/Gender" }
        stateId: { type: string }
        districtId: { type: string, nullable: true }
        membershipValidUntil: { type: string, format: date-time, nullable: true }
        isBlacklisted: { type: boolean }
        termsAcceptedAt: { type: string, format: date-time, nullable: true }
    LoginVolunteerProfile:
      type: object
      nullable: true
      properties:
        registrationNumber: { type: string, nullable: true }
        fullName: { type: string }
        fatherName: { type: string, nullable: true }
        motherName: { type: string, nullable: true }
        aadharNumber: { type: string, nullable: true }
        maritalStatus: { $ref: "#/components/schemas/MaritalStatus" }
        alternatePhone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        dateOfBirth: { type: string, format: date-time, nullable: true }
        tShirtSize: { $ref: "#/components/schemas/TShirtSize" }
        hasDisability: { type: boolean }
        disabilityDetails: { type: string, nullable: true }
        photoUrl: { type: string, nullable: true }
        aadharFrontUrl: { type: string, nullable: true }
        aadharBackUrl: { type: string, nullable: true }
        gender: { $ref: "#/components/schemas/Gender" }
        stateId: { type: string }
        districtId: { type: string, nullable: true }
        membershipValidUntil: { type: string, format: date-time, nullable: true }
        isBlacklisted: { type: boolean }
    LoginUser:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/Role" }
        isActive: { type: boolean }
        disabledReason: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        isSuperNational: { type: boolean }
        stateId: { type: string, nullable: true }
        districtId: { type: string, nullable: true }
        trainingCenterId: { type: string, nullable: true }
        stateRegistrationId: { type: string, nullable: true }
        districtRegistrationId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        state:
          allOf:
            - $ref: "#/components/schemas/LoginStateSummary"
          nullable: true
        district:
          allOf:
            - $ref: "#/components/schemas/LoginDistrictSummary"
          nullable: true
        trainingCenter:
          allOf:
            - $ref: "#/components/schemas/LoginTrainingCenterSummary"
          nullable: true
        playerProfile: { $ref: "#/components/schemas/LoginPlayerProfile" }
        coachProfile: { $ref: "#/components/schemas/LoginCoachProfile" }
        refereeProfile: { $ref: "#/components/schemas/LoginRefereeProfile" }
        volunteerProfile: { $ref: "#/components/schemas/LoginVolunteerProfile" }
    PublicUserIdCard:
      description: >
        Minimal public ID-card payload (no Bearer). Fields vary by `role`: e.g. players include
        DOB and geo; national admins only `userId`, `role`, and a display `name`.
      type: object
      required: [userId, role, name]
      properties:
        userId: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        name: { type: string }
        dateOfBirth: { type: string, format: date-time, nullable: true }
        gender:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Gender"
        registrationNumber: { type: string, nullable: true, description: Membership number when assigned on profile }
        photoUrl:
          type: string
          format: uri
          nullable: true
          description: >
            Profile / passport photo public URL when available: player-coach-referee-volunteer use
            profile `photoUrl`; training center uses center `headPassportPhotoUrl`; state/district
            admins use registration `passportPhotoUrl`; national admins typically null.
        trainingCenter:
          nullable: true
          type: object
          properties:
            id: { type: string }
            name: { type: string }
        district:
          nullable: true
          type: object
          properties:
            id: { type: string }
            name: { type: string }
        state:
          nullable: true
          type: object
          properties:
            id: { type: string }
            name: { type: string }
    LoginResponse:
      type: object
      properties:
        accessToken: { type: string }
        user: { $ref: "#/components/schemas/LoginUser" }
    AdminUserListItem:
      type: object
      description: User directory row (no password)
      properties:
        id: { type: string }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/Role" }
        isActive: { type: boolean }
        disabledReason: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        isSuperNational: { type: boolean }
        stateId: { type: string, nullable: true }
        districtId: { type: string, nullable: true }
        trainingCenterId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        state:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            code: { type: string }
        district:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
        trainingCenter:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
        userTypeProfile:
          description: Role-specific profile/registration payload for this row; null when unavailable.
          nullable: true
          additionalProperties: true
    AdminUserListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminUserListItem" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    HierarchyUserListResponse:
      description: Admin user list shape plus the requested `role` for this endpoint.
      allOf:
        - $ref: "#/components/schemas/AdminUserListResponse"
        - type: object
          required: [role]
          properties:
            role:
              $ref: "#/components/schemas/Role"
    PublicRefereeDirectoryRow:
      type: object
      required: [name, state]
      properties:
        name:
          type: string
          description: "Referee display name from RefereeProfile.fullName."
        state:
          type: object
          required: [id, name, code]
          properties:
            id: { type: string }
            name: { type: string }
            code: { type: string }
        district:
          type: object
          nullable: true
          description: Omit or null when no district linked
          properties:
            id: { type: string }
            name: { type: string }
    PublicRefereesDirectoryResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PublicRefereeDirectoryRow" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 200 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    DashboardStatsResponse:
      type: object
      required:
        - totalStates
        - totalDistricts
        - totalUsers
        - ageGroups
        - eventGroups
        - competitions
        - players
        - tournamentRegistrations
      properties:
        totalStates:
          type: integer
          nullable: true
          minimum: 0
          description: National admin only — count of enabled states (`State.isEnabled`); null for other roles.
        totalDistricts:
          type: integer
          minimum: 0
          description: Enabled districts (`District.isEnabled`) within scope; district/TC cards use 0–1 when scope is a single district.
        totalUsers:
          type: integer
          minimum: 0
          description: Users with ACCEPTED status and active accounts, within geographic scope.
        ageGroups:
          type: integer
          minimum: 0
          description: Active age categories (`AgeCategory.isActive`) — global catalog (in use).
        eventGroups:
          type: integer
          minimum: 0
          description: Active event groups (`EventGroup.isActive`) — global catalog (in use).
        competitions:
          type: integer
          minimum: 0
          description: >-
            Competitions visible to this user (same rules as competitions “me” list),
            excluding closed competitions (`isClosed` false).
        players:
          type: integer
          minimum: 0
          description: Player profiles in scope whose linked user is ACCEPTED and active.
        tournamentRegistrations:
          type: integer
          minimum: 0
          description: >-
            Tournament registrations in scope whose player user is ACCEPTED and active,
            with profile matching the geographic filter.
    DashboardOverviewResponse:
      type: object
      required:
        - activeCoaches
        - pendingApprovals
        - trainingCenters
        - refereesCertified
      properties:
        activeCoaches:
          type: integer
          minimum: 0
          description: >-
            Accepted, active coaches (`User.role` COACH, `EntityStatus` ACCEPTED) within the
            signed-in admin's geographic hierarchy.
        pendingApprovals:
          type: integer
          minimum: 0
          description: >-
            Sum of users in `SUBMITTED` status (any role) plus district registrations in
            `SUBMITTED` status, within hierarchy scope.
        trainingCenters:
          type: integer
          minimum: 0
          description: >-
            Accepted, enabled training centers (`TrainingCenter.status` ACCEPTED,
            `isEnabled` true) within hierarchy scope.
        refereesCertified:
          type: integer
          minimum: 0
          description: >-
            Accepted, active referees who are not blacklisted (`User.role` REFEREE,
            `EntityStatus` ACCEPTED, `RefereeProfile.isBlacklisted` false) within hierarchy scope.
    HierarchyPasswordResetRequest:
      type: object
      required: [newPassword]
      properties:
        newPassword: { type: string, format: password, minLength: 8 }
    HierarchyPasswordResetResponse:
      type: object
      required: [ok, userId]
      properties:
        ok: { type: boolean, const: true }
        userId: { type: string }
    PatchMyProfileRequest:
      type: object
      description: >
        Update the signed-in account. Send at least one of `email`, `phone`, or exactly one
        non-empty role-specific subsection (`playerProfile`, `coachProfile`, etc.) per request.
        NATIONAL_ADMIN may only change `email` / `phone`.
      additionalProperties: false
      properties:
        email: { type: string, format: email }
        phone: { type: string, nullable: true, minLength: 7, maxLength: 25 }
        playerProfile:
          type: object
          additionalProperties: false
          properties:
            fullName: { type: string, minLength: 1, maxLength: 200 }
            fatherName: { type: string, nullable: true, minLength: 1, maxLength: 160 }
            motherName: { type: string, nullable: true, minLength: 1, maxLength: 160 }
            whatsappNo: { type: string, minLength: 7, maxLength: 25 }
            address: { type: string, minLength: 3, maxLength: 1000 }
            maritalStatus: { $ref: "#/components/schemas/MaritalStatus" }
            tShirtSize: { $ref: "#/components/schemas/TShirtSize" }
