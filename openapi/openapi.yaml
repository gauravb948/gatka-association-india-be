openapi: 3.0.3
info:
  title: Gatka Association India API
  version: 1.0.0
  description: |
    REST API for centralized Gatka management (roles, geography, registrations, Razorpay, competitions, camps, attendance, results, notices, migration).

    **Banners:** carousel items with `imageUrl`, optional `title` / `subtitle`, ordering via `sortOrder`.

    **Uploads:** Cloudflare R2 — `POST /uploads/r2/upload` (multipart) and `POST /uploads/r2/presign-put` (JSON) are **public** (no JWT); protected by **rate limits**. Store returned `publicUrl` on entities (e.g. banners, registration photos).

    **Rate limiting:** per-IP limits on `/api` (and stricter limits on auth and upload presign). Exceeded limits return **429** with JSON `{ error, code: RATE_LIMITED, kind, retryAfterSec }`. Use `TRUST_PROXY=1` behind a reverse proxy.
servers:
  - url: http://localhost:4000/api
    description: Local
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    userListPage:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    userListPageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    userListStatus:
      name: status
      in: query
      schema: { type: string }
      description: Filter by `EntityStatus`; comma-separated (e.g. `PENDING,ACCEPTED`).
    userListStateId:
      name: stateId
      in: query
      schema: { type: string }
      description: Optional geography filter (national; state/district admins only when it matches their scope).
    userListDistrictId:
      name: districtId
      in: query
      schema: { type: string }
      description: Optional district filter (national; state admin must be in-state; district admin must be own district).
    userListTrainingCenterId:
      name: trainingCenterId
      in: query
      schema: { type: string }
      description: Optional training center filter (national; state/district when TC is in scope).
  schemas:
    Membership:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        type: { type: string, enum: [NATIONAL_ADMIN, STATE_ADMIN, DISTRICT_ADMIN, TRAINING_CENTER, COACH, REFEREE, PLAYER, VOLUNTEER] }
        validFrom: { type: string, format: date-time }
        validUntil: { type: string, format: date-time }
        status: { type: string, enum: [ACTIVE, EXPIRED] }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
    RateLimitedError:
      type: object
      properties:
        error:
          type: string
          example: Too many requests
        code:
          type: string
          example: RATE_LIMITED
        kind:
          type: string
          enum: [api, auth, upload]
        retryAfterSec:
          type: integer
    Banner:
      type: object
      properties:
        id:
          type: string
        imageUrl:
          type: string
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        isActive:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BannerCreate:
      type: object
      required: [imageUrl]
      properties:
        imageUrl:
          type: string
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        isActive:
          type: boolean
        sortOrder:
          type: integer
    BannerPatch:
      type: object
      properties:
        imageUrl:
          type: string
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        isActive:
          type: boolean
        sortOrder:
          type: integer
    R2PresignPutRequest:
      type: object
      required: [contentType]
      properties:
        contentType:
          type: string
          description: Allowed image MIME types (e.g. image/png, image/jpeg, image/webp, image/gif, image/svg+xml)
        prefix:
          type: string
          description: Object key prefix (default "banners")
          default: banners
    R2PresignPutResponse:
      type: object
      properties:
        key:
          type: string
        publicUrl:
          type: string
          format: uri
        uploadUrl:
          type: string
          format: uri
        expiresInSeconds:
          type: integer
    EntityStatus:
      type: string
      enum: [PENDING, SUBMITTED, ACCEPTED, REJECTED, BLOCKED]
    Gender:
      type: string
      enum: [MALE, FEMALE, BOYS, GIRLS]
    MaritalStatus:
      type: string
      enum: [SINGLE, MARRIED, DIVORCED, WIDOWED, SEPARATED, OTHER]
    TShirtSize:
      type: string
      enum: [XS, S, M, L, XL, XXL, XXXL]
    PlayingHand:
      type: string
      enum: [LEFT, RIGHT, BOTH]
    CoachAppliedFor:
      type: string
      enum: [SENIOR_COACH, ASSISTANT_COACH]
    GatkaExperience:
      type: string
      enum: [LT_1_YEAR, Y1_3, Y3_5, Y5_10, GT_10]
    Role:
      type: string
      enum:
        [
          NATIONAL_ADMIN,
          STATE_ADMIN,
          DISTRICT_ADMIN,
          TRAINING_CENTER,
          COACH,
          REFEREE,
          PLAYER,
          VOLUNTEER,
        ]
    ConfigurableFeeRole:
      type: string
      description: Roles that have a configurable national fee (excludes NATIONAL_ADMIN)
      enum:
        [
          STATE_ADMIN,
          DISTRICT_ADMIN,
          TRAINING_CENTER,
          COACH,
          REFEREE,
          PLAYER,
          VOLUNTEER,
        ]
    RolePaymentFeeConfig:
      type: object
      properties:
        role: { $ref: "#/components/schemas/ConfigurableFeeRole" }
        feeAmountPaise:
          type: integer
          description: Amount in paise (INR); 100 paise = 1 INR
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RolePaymentFeesPatchBody:
      type: object
      required: [fees]
      properties:
        fees:
          type: array
          minItems: 1
          items:
            type: object
            required: [role, feeAmountPaise]
            properties:
              role: { $ref: "#/components/schemas/ConfigurableFeeRole" }
              feeAmountPaise: { type: integer, minimum: 0 }
    LoginStateSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string }
        isEnabled: { type: boolean }
    LoginDistrictSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        isEnabled: { type: boolean }
        state:
          type: object
          properties:
            id: { type: string }
            isEnabled: { type: boolean }
    LoginTrainingCenterSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        isEnabled: { type: boolean }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        termsAcceptedAt: { type: string, format: date-time, nullable: true }
        district:
          type: object
          properties:
            id: { type: string }
            isEnabled: { type: boolean }
            state:
              type: object
              properties:
                id: { type: string }
                isEnabled: { type: boolean }
    LoginPlayerProfile:
      type: object
      nullable: true
      properties:
        fullName: { type: string }
        fatherName: { type: string, nullable: true }
        motherName: { type: string, nullable: true }
        aadharNumber: { type: string, nullable: true }
        maritalStatus: { $ref: "#/components/schemas/MaritalStatus", nullable: true }
        whatsappNo: { type: string, nullable: true }
        tShirtSize: { $ref: "#/components/schemas/TShirtSize", nullable: true }
        playingHand: { $ref: "#/components/schemas/PlayingHand", nullable: true }
        photoUrl: { type: string, nullable: true }
        aadharFrontUrl: { type: string, nullable: true }
        aadharBackUrl: { type: string, nullable: true }
        address: { type: string, nullable: true }
        gender: { $ref: "#/components/schemas/Gender" }
        dateOfBirth: { type: string, format: date-time }
        registrationNumber: { type: string, nullable: true }
        membershipValidFrom: { type: string, format: date-time, nullable: true }
        membershipValidUntil: { type: string, format: date-time, nullable: true }
        registrationStatus: { type: string }
        documentsVerifiedAt: { type: string, format: date-time, nullable: true }
        isBlacklisted: { type: boolean }
        stateId: { type: string }
        districtId: { type: string }
        trainingCenterId: { type: string }
        dateOfJoining: { type: string, format: date-time }
        termsAcceptedAt: { type: string, format: date-time, nullable: true }
    LoginCoachProfile:
      type: object
      nullable: true
      properties:
        fullName: { type: string }
        fatherName: { type: string, nullable: true }
        aadharNumber: { type: string, nullable: true }
        address: { type: string, nullable: true }
        education: { type: string, nullable: true }
        photoUrl: { type: string, nullable: true }
        aadharFrontUrl: { type: string, nullable: true }
        aadharBackUrl: { type: string, nullable: true }
        gender: { $ref: "#/components/schemas/Gender" }
        appliedFor: { $ref: "#/components/schemas/CoachAppliedFor", nullable: true }
        experienceInGatka: { $ref: "#/components/schemas/GatkaExperience", nullable: true }
        membershipValidUntil: { type: string, format: date-time, nullable: true }
        trainingCenterId: { type: string }
        isBlacklisted: { type: boolean }
        termsAcceptedAt: { type: string, format: date-time, nullable: true }
    LoginRefereeProfile:
      type: object
      nullable: true
      properties:
        fullName: { type: string }
        fatherName: { type: string, nullable: true }
        aadharNumber: { type: string, nullable: true }
        alternatePhone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        appliedFor: { type: string, nullable: true }
        education: { type: string, nullable: true }
        experienceInGatka: { $ref: "#/components/schemas/GatkaExperience", nullable: true }
        photoUrl: { type: string, nullable: true }
        aadharFrontUrl: { type: string, nullable: true }
        aadharBackUrl: { type: string, nullable: true }
        gender: { $ref: "#/components/schemas/Gender" }
        stateId: { type: string }
        districtId: { type: string, nullable: true }
        membershipValidUntil: { type: string, format: date-time, nullable: true }
        isBlacklisted: { type: boolean }
        termsAcceptedAt: { type: string, format: date-time, nullable: true }
    LoginVolunteerProfile:
      type: object
      nullable: true
      properties:
        fullName: { type: string }
        photoUrl: { type: string, nullable: true }
        gender: { $ref: "#/components/schemas/Gender" }
        stateId: { type: string }
        membershipValidUntil: { type: string, format: date-time, nullable: true }
        isBlacklisted: { type: boolean }
    LoginUser:
      type: object
      properties:
        id: { type: string }
        username: { type: string, nullable: true }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/Role" }
        isActive: { type: boolean }
        disabledReason: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        isSuperNational: { type: boolean }
        stateId: { type: string, nullable: true }
        districtId: { type: string, nullable: true }
        trainingCenterId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        state:
          allOf:
            - $ref: "#/components/schemas/LoginStateSummary"
          nullable: true
        district:
          allOf:
            - $ref: "#/components/schemas/LoginDistrictSummary"
          nullable: true
        trainingCenter:
          allOf:
            - $ref: "#/components/schemas/LoginTrainingCenterSummary"
          nullable: true
        playerProfile: { $ref: "#/components/schemas/LoginPlayerProfile" }
        coachProfile: { $ref: "#/components/schemas/LoginCoachProfile" }
        refereeProfile: { $ref: "#/components/schemas/LoginRefereeProfile" }
        volunteerProfile: { $ref: "#/components/schemas/LoginVolunteerProfile" }
    LoginResponse:
      type: object
      properties:
        accessToken: { type: string }
        user: { $ref: "#/components/schemas/LoginUser" }
    AdminUserListItem:
      type: object
      description: User directory row (no password)
      properties:
        id: { type: string }
        username: { type: string, nullable: true }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/Role" }
        isActive: { type: boolean }
        disabledReason: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        isSuperNational: { type: boolean }
        stateId: { type: string, nullable: true }
        districtId: { type: string, nullable: true }
        trainingCenterId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        state:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            code: { type: string }
        district:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
        trainingCenter:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
        userTypeProfile:
          description: Role-specific profile/registration payload for this row; null when unavailable.
          nullable: true
          additionalProperties: true
    AdminUserListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminUserListItem" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    HierarchyUserListResponse:
      description: Admin user list shape plus the requested `role` for this endpoint.
      allOf:
        - $ref: "#/components/schemas/AdminUserListResponse"
        - type: object
          required: [role]
          properties:
            role:
              $ref: "#/components/schemas/Role"
    RegistrationApplicantUser:
      type: object
      description: Linked applicant account (subset of fields; no password)
      properties:
        id: { type: string }
        email: { type: string, format: email }
        username: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/Role" }
        status: { $ref: "#/components/schemas/EntityStatus" }
        stateId: { type: string, nullable: true }
        districtId: { type: string, nullable: true }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
    StateRegistrationAuthResponse:
      type: object
      required: [accessToken, user, registration]
      properties:
        accessToken: { type: string }
        user: { $ref: "#/components/schemas/LoginUser" }
        registration: { $ref: "#/components/schemas/StateRegistration" }
    DistrictRegistrationAuthResponse:
      type: object
      required: [accessToken, user, registration]
      properties:
        accessToken: { type: string }
        user: { $ref: "#/components/schemas/LoginUser" }
        registration: { $ref: "#/components/schemas/DistrictRegistration" }
    RegisterPlayerRequest:
      type: object
      required:
        [
          fullName,
          fatherName,
          motherName,
          aadharNumber,
          maritalStatus,
          userName,
          email,
          password,
          mobileNo,
          whatsappNo,
          address,
          gender,
          dateOfBirth,
          stateId,
          districtId,
          trainingCenterId,
          photoUrl,
          aadharFrontUrl,
          aadharBackUrl,
          tShirtSize,
          playingHand,
          acceptTerms,
        ]
      properties:
        fullName: { type: string }
        fatherName: { type: string }
        motherName: { type: string }
        aadharNumber: { type: string, description: "Digits (spaces allowed; normalized server-side)" }
        maritalStatus: { $ref: "#/components/schemas/MaritalStatus" }
        userName: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password }
        mobileNo: { type: string }
        whatsappNo: { type: string }
        address: { type: string }
        gender: { $ref: "#/components/schemas/Gender" }
        dateOfBirth: { type: string, format: date-time }
        stateId: { type: string }
        districtId: { type: string }
        trainingCenterId: { type: string }
        photoUrl: { type: string, format: uri, description: "Passport-size photo (R2 publicUrl)" }
        aadharFrontUrl: { type: string, format: uri }
        aadharBackUrl: { type: string, format: uri }
        tShirtSize: { $ref: "#/components/schemas/TShirtSize" }
        playingHand: { $ref: "#/components/schemas/PlayingHand" }
        acceptTerms:
          type: boolean
          enum: [true]
          description: Must be true — server records `termsAcceptedAt` on the profile
    RegisterCoachRequest:
      type: object
      required:
        [
          fullName,
          fatherName,
          aadharNumber,
          address,
          education,
          stateId,
          districtId,
          trainingCenterId,
          email,
          password,
          phone,
          appliedFor,
          experienceInGatka,
          photoUrl,
          aadharFrontUrl,
          aadharBackUrl,
          gender,
          acceptTerms,
        ]
      properties:
        fullName: { type: string }
        fatherName: { type: string }
        aadharNumber: { type: string, description: "Digits (spaces stripped server-side)" }
        address: { type: string }
        education: { type: string, description: "Education / qualifications text" }
        stateId: { type: string }
        districtId: { type: string }
        trainingCenterId: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password }
        phone: { type: string }
        appliedFor: { $ref: "#/components/schemas/CoachAppliedFor" }
        experienceInGatka: { $ref: "#/components/schemas/GatkaExperience" }
        photoUrl: { type: string, format: uri, description: "Passport-size photo (R2 publicUrl)" }
        aadharFrontUrl: { type: string, format: uri }
        aadharBackUrl: { type: string, format: uri }
        gender: { $ref: "#/components/schemas/Gender" }
        acceptTerms:
          type: boolean
          enum: [true]
          description: Must be true — server sets `termsAcceptedAt` on the coach profile
    RegisterRefereeRequest:
      type: object
      required:
        [
          fullName,
          fatherName,
          aadharNumber,
          address,
          education,
          appliedFor,
          experienceInGatka,
          email,
          password,
          phone,
          gender,
          stateId,
          districtId,
          photoUrl,
          aadharFrontUrl,
          aadharBackUrl,
          acceptTerms,
        ]
      properties:
        fullName: { type: string }
        fatherName: { type: string }
        aadharNumber: { type: string }
        address: { type: string }
        education: { type: string }
        appliedFor: { type: string, description: "What the applicant is applying for (free text)" }
        experienceInGatka: { $ref: "#/components/schemas/GatkaExperience" }
        email: { type: string, format: email }
        password: { type: string, format: password }
        phone: { type: string }
        alternatePhone: { type: string, description: "Optional second mobile" }
        gender: { $ref: "#/components/schemas/Gender" }
        stateId: { type: string }
        districtId: { type: string }
        photoUrl: { type: string, format: uri }
        aadharFrontUrl: { type: string, format: uri }
        aadharBackUrl: { type: string, format: uri }
        acceptTerms:
          type: boolean
          enum: [true]
          description: Must be true — server sets `termsAcceptedAt` on the referee profile
    RegisterVolunteerRequest:
      type: object
      required: [email, password, phone, fullName, gender, stateId]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
        phone: { type: string }
        fullName: { type: string }
        gender: { $ref: "#/components/schemas/Gender" }
        stateId: { type: string }
    RegisterTrainingCenterRequest:
      type: object
      required:
        [
          email,
          password,
          phone,
          name,
          address,
          stateId,
          districtId,
          headName,
          headAadharNumber,
          headPassportPhotoUrl,
          headAadharFrontUrl,
          headAadharBackUrl,
          acceptTerms,
        ]
      properties:
        email: { type: string, format: email, description: "Center login email" }
        password: { type: string, format: password }
        phone: { type: string }
        name: { type: string, description: "Training center name" }
        address: { type: string }
        stateId: { type: string }
        districtId: { type: string }
        headName: { type: string }
        headAadharNumber: { type: string, description: "Digits (spaces stripped server-side)" }
        registrarNumber: { type: string, description: "Optional" }
        registrationCertificateUrl:
          type: string
          format: uri
          nullable: true
          description: "Optional R2 publicUrl"
        headPassportPhotoUrl: { type: string, format: uri }
        headAadharFrontUrl: { type: string, format: uri }
        headAadharBackUrl: { type: string, format: uri }
        acceptTerms:
          type: boolean
          enum: [true]
          description: Must be true — server sets `termsAcceptedAt` on the training center
    State:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string }
        isEnabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    StateCreate:
      type: object
      required: [name, code]
      properties:
        name: { type: string }
        code: { type: string, description: "2-8 char uppercase code" }
        isEnabled: { type: boolean, default: false }
    StatePatch:
      type: object
      properties:
        name: { type: string }
        isEnabled: { type: boolean }
    StateDetailResponse:
      type: object
      description: >
        State with nested `districts` (each includes slim `state`, `trainingCenters` with `district`,
        `registration` with applicant `user` (including `memberships`) and payment summary), state-body `registration`,
        `paymentConfig` without secrets plus `hasKeySecret` / `hasWebhookSecret`, `galleryImages`,
        `pagesContents`, and `districtRegistrationsApplyingFrom` with `district`, `user`, and payment summary.
      additionalProperties: true
    DistrictDetailResponse:
      type: object
      description: >
        District with `state` (state registration, public payment config with presence flags, sibling districts),
        `trainingCenters` (each with slim `district`), and district-body `registration` with applicant `user`
        and payment summary.
      additionalProperties: true
    StatePaymentConfigPut:
      type: object
      required: [razorpayKeyId, razorpayKeySecret, webhookSecret]
      properties:
        razorpayKeyId: { type: string }
        razorpayKeySecret: { type: string }
        webhookSecret: { type: string }
    StatePaymentConfigResponse:
      type: object
      properties:
        id: { type: string }
        stateId: { type: string }
        razorpayKeyId: { type: string }
        hasKeySecret: { type: boolean }
        hasWebhookSecret: { type: boolean }
        updatedAt: { type: string, format: date-time }
    PublicStateListItem:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string }
    PublicDistrictListItem:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        stateId: { type: string }
    PaginatedPublicStateListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PublicStateListItem" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    PaginatedStateListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/State" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    PaginatedPublicDistrictListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PublicDistrictListItem" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    PaginatedDistrictListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/District" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    District:
      type: object
      properties:
        id: { type: string }
        stateId: { type: string }
        name: { type: string }
        isEnabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DistrictCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        isEnabled: { type: boolean, default: false }
    DistrictPatch:
      type: object
      properties:
        name: { type: string }
        isEnabled: { type: boolean }
    AgeBandType:
      type: string
      enum: [SUB_JUNIOR, JUNIOR, SENIOR, VETERAN, OPEN]
    AgeCategory:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        ageFrom: { type: integer, nullable: true }
        ageTo: { type: integer, nullable: true }
        bandType: { $ref: "#/components/schemas/AgeBandType", nullable: true }
        sortOrder: { type: integer }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    AgeCategoryBody:
      type: object
      required: [name]
      properties:
        name: { type: string }
        ageFrom: { type: integer, nullable: true }
        ageTo: { type: integer, nullable: true }
        bandType: { $ref: "#/components/schemas/AgeBandType", nullable: true }
        sortOrder: { type: integer }
        isActive: { type: boolean }
    AgeCategoryAdminListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AgeCategory" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    GalleryImage:
      type: object
      properties:
        id: { type: string }
        imageUrl: { type: string }
        stateId: { type: string }
        caption: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    GalleryImageCreate:
      type: object
      required: [imageUrl, stateId]
      properties:
        imageUrl: { type: string, format: uri }
        stateId: { type: string }
        caption: { type: string, nullable: true }
    Message:
      type: object
      properties:
        id: { type: string }
        imageUrl: { type: string, nullable: true }
        name: { type: string }
        message: { type: string }
        designation: { type: string, nullable: true }
        stateId: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    MessageCreate:
      type: object
      required: [name, message, stateId]
      properties:
        imageUrl: { type: string, format: uri, nullable: true }
        name: { type: string }
        message: { type: string }
        designation: { type: string, nullable: true }
        stateId: { type: string }
    MessagePatch:
      type: object
      properties:
        imageUrl: { type: string, format: uri, nullable: true }
        name: { type: string }
        message: { type: string }
        designation: { type: string, nullable: true }
    StatusChangeRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
    TrainingCenterStatusChangeRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACCEPTED, REJECTED, BLOCKED]
        statusReason:
          type: string
          nullable: true
          description: Required when status is REJECTED or BLOCKED
    StateRegistrationCreate:
      type: object
      required:
        [stateId, firstName, lastName, userName, email, password, mobileNo, address]
      properties:
        stateId: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        userName: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, format: uri, nullable: true }
    DistrictRegistrationCreate:
      type: object
      required:
        [
          stateId,
          districtId,
          firstName,
          lastName,
          userName,
          email,
          password,
          mobileNo,
          address,
        ]
      properties:
        stateId: { type: string, description: "Must match the district's state" }
        districtId: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        userName: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, format: uri, nullable: true }
    StateRegistration:
      type: object
      description: Password is stored only on the linked User account, not on this row
      properties:
        id: { type: string }
        stateId: { type: string }
        userId: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        userName: { type: string }
        email: { type: string, format: email }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        state:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            code: { type: string }
            isEnabled: { type: boolean }
        user:
          allOf:
            - $ref: "#/components/schemas/RegistrationApplicantUser"
          nullable: true
    RegistrationPaymentSummary:
      type: object
      description: Non-sensitive payment row linked to a registration
      properties:
        id: { type: string }
        purpose: { type: string }
        amountPaise: { type: integer }
        currency: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DistrictRegistrationNestedSummary:
      description: District-body registration nested under a state’s district (no nested district/state)
      type: object
      properties:
        id: { type: string }
        districtId: { type: string }
        stateId: { type: string }
        userId: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        userName: { type: string }
        email: { type: string, format: email }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DistrictWithOptionalDistrictRegistration:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        isEnabled: { type: boolean }
        registration:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/DistrictRegistrationNestedSummary"
    StateWithDistrictRegistrations:
      description: State with ordered districts; each district may include its body registration
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string }
        isEnabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        districts:
          type: array
          items: { $ref: "#/components/schemas/DistrictWithOptionalDistrictRegistration" }
    StateBodyRegistrationSnapshot:
      description: Parent state’s own body registration (`State.registration`), when present
      type: object
      properties:
        id: { type: string }
        stateId: { type: string }
        userId: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        userName: { type: string }
        email: { type: string, format: email }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        user:
          allOf:
            - $ref: "#/components/schemas/RegistrationApplicantUser"
          nullable: true
    StateWithStateBodyRegistration:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string }
        isEnabled: { type: boolean }
        registration:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/StateBodyRegistrationSnapshot"
    StateRegistrationDetail:
      description: >
        `GET /state-registrations/state/{stateId}` includes optional `payment`, applicant `user`,
        and `state` with all `districts` (each may include `registration` for the district body).
      allOf:
        - $ref: "#/components/schemas/StateRegistration"
        - type: object
          properties:
            payment:
              nullable: true
              $ref: "#/components/schemas/RegistrationPaymentSummary"
            state:
              nullable: true
              $ref: "#/components/schemas/StateWithDistrictRegistrations"
    DistrictRegistrationDetail:
      description: >
        `GET /district-registrations/district/{districtId}` includes optional `payment`, applicant `user`,
        and `state.registration` for the parent state’s body registration when present.
      allOf:
        - $ref: "#/components/schemas/DistrictRegistration"
        - type: object
          properties:
            payment:
              nullable: true
              $ref: "#/components/schemas/RegistrationPaymentSummary"
            state:
              nullable: true
              $ref: "#/components/schemas/StateWithStateBodyRegistration"
    StateRegistrationListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/StateRegistration" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    DistrictRegistration:
      type: object
      description: Password is stored only on the linked User account, not on this row
      properties:
        id: { type: string }
        stateId: { type: string }
        districtId: { type: string }
        userId: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        userName: { type: string }
        email: { type: string, format: email }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        state:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            code: { type: string }
            isEnabled: { type: boolean }
        district:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            stateId: { type: string }
            isEnabled: { type: boolean }
        user:
          allOf:
            - $ref: "#/components/schemas/RegistrationApplicantUser"
          nullable: true
    DistrictRegistrationListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/DistrictRegistration" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: JWT and full user context for the client (no password)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /auth/me:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get current user by token (fresh DB snapshot)
      responses:
        "200":
          description: OK (envelope wraps this payload in `data`)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      user: { $ref: "#/components/schemas/LoginUser" }
  /auth/register/player:
    post:
      summary: Self-register player (pending payment until webhook)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPlayerRequest"
      responses:
        "201":
          description: Created
  /auth/register/coach:
    post:
      summary: Self-register coach (pending approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCoachRequest"
      responses:
        "201":
          description: Created
  /auth/register/referee:
    post:
      summary: Self-register referee (pending approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRefereeRequest"
      responses:
        "201":
          description: Created
  /auth/register/volunteer:
    post:
      summary: Self-register volunteer (pending approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterVolunteerRequest"
      responses:
        "201":
          description: Created
  /auth/register/training-center:
    post:
      summary: Register training center + login user (pending approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterTrainingCenterRequest"
      responses:
        "201":
          description: Created
  /auth/otp/request:
    post:
      summary: Request password reset OTP (SMS queued if phone on file)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phoneOrEmail:
                  type: string
  /auth/otp/confirm:
    post:
      summary: Confirm OTP and set new password
      requestBody:
        content:
          application/json:
            schema:
              type: object
  /states/public:
    get:
      summary: List enabled states where state-body registration is not created yet (public, paginated)
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPublicStateListResponse"
  /states/public/registration-accepted:
    get:
      summary: List enabled states with ACCEPTED state-body registration and payment config (public, paginated)
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPublicStateListResponse"
  /states:
    get:
      security: [{ bearerAuth: [] }]
      summary: List all states (national admin, paginated)
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedStateListResponse"
    post:
      security: [{ bearerAuth: [] }]
      summary: Create state (national admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StateCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/State" }
  /states/{id}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get state by id (nested relations; national admin or state admin for own state)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StateDetailResponse" }
        "403":
          description: Forbidden
        "404":
          description: State not found
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update state — enable/disable, rename (national admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StatePatch" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/State" }
  /states/{id}/payment-config:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get Razorpay config metadata for state (state admin, own state only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatePaymentConfigResponse" }
        "404":
          description: Not found
    put:
      security: [{ bearerAuth: [] }]
      summary: Upsert per-state Razorpay keys and webhook secret (state admin, own state only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StatePaymentConfigPut" }
      responses:
        "200":
          description: Upserted
  /districts/public/by-state/{stateId}/registration-accepted:
    get:
      summary: List enabled districts whose district-body registration is ACCEPTED (public, paginated)
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPublicDistrictListResponse"
  /districts/public/by-state/{stateId}:
    get:
      summary: List enabled districts for state (public, paginated)
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPublicDistrictListResponse"
  /districts/by-state/{stateId}:
    get:
      security: [{ bearerAuth: [] }]
      summary: All districts for state (national/state admin, paginated)
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDistrictListResponse"
  /districts/state/{stateId}:
    post:
      security: [{ bearerAuth: [] }]
      summary: Create district under state (national/state admin)
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DistrictCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/District" }
  /districts/{id}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get district by id (nested relations; national, state admin in-state, or own district admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DistrictDetailResponse" }
        "403":
          description: Forbidden
        "404":
          description: District not found
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update district — enable/disable, rename (national/state admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DistrictPatch" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/District" }
  /training-centers/public/by-district/{districtId}:
    get:
      summary: Enabled training centers
  /settings/global:
    get:
      security: [{ bearerAuth: [] }]
      summary: Global settings (age calculation date, membership expiry date)
  /settings/global/age-calculation-date:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Set age calculation date (national + super flag)
  /settings/global/membership-expiry-date:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Set membership validity end date for paid registrations (national + super flag)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                membershipExpiryDate:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "200":
          description: Updated global settings
  /settings/role-payment-fees:
    get:
      summary: National registration fee per role (public)
      description: One row per role except NATIONAL_ADMIN. Amounts are in paise (INR).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RolePaymentFeeConfig" }
    patch:
      security: [{ bearerAuth: [] }]
      summary: Upsert role fees (national admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RolePaymentFeesPatchBody" }
      responses:
        "200":
          description: Updated list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RolePaymentFeeConfig" }
  /age-categories:
    get:
      summary: List active age categories (public)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AgeCategory" }
    post:
      security: [{ bearerAuth: [] }]
      summary: Create age category (national admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgeCategoryBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgeCategory" }
  /age-categories/admin:
    get:
      security: [{ bearerAuth: [] }]
      summary: List all age categories (national admin, paginated)
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
