  /competitions:
    get:
      summary: List competitions
      parameters:
        - name: name
          in: query
          required: false
          description: Case-insensitive substring match on competition name
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Competition" }
    post:
      security: [{ bearerAuth: [] }]
      summary: Create competition (form fields only; level from admin role; season year from createdAt)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompetitionCreateBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Competition" }
        "409":
          description: Competition name already exists
  /competitions/me:
    get:
      security: [{ bearerAuth: [] }]
      summary: List competitions for the current user (paginated)
      description: >
        National admins see competitions they created, those created by state/district admins,
        and legacy rows with no recorded creator.
        State admins see non-national competitions where their state appears in the competition's
        selected states, or where at least one selected district lies in their state (so a national
        admin limiting a competition to states A and B only surfaces it to state admins A and B).
        District admins see non-national competitions that list their district, or with no districts
        selected but their state in the selected states (state-wide scope).         Legacy competitions
        with no state/district rows remain visible to state and district admins.
        Training centers see district-level competitions that include their district in the
        competition's selected districts.
        Other authenticated users see distinct competitions where they have at least one tournament
        registration as the player. Items include `createdBy` when available.
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: name
          in: query
          required: false
          description: Case-insensitive substring match on competition name
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompetitionMeListResponse" }
        "401":
          description: Unauthorized
  /competitions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get competition by id (full detail)
      description: >
        Public. Returns geographic scope with nested states/districts, age category links,
        creator summary, and competition events with each event's group and age category.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompetitionDetail" }
        "404":
          description: Competition not found
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update competition (scoped admins; not when closed)
      description: >
        Partial update. Response includes `createdBy` and `createdById` like create. Supports multiple
        `genders` and `ageCategoryIds` (replace junction when `ageCategoryIds` is sent).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompetitionPatchBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Competition" }
        "400":
          description: Closed competition
        "403":
          description: Outside admin scope
        "409":
          description: Name taken
  /competitions/{id}/close:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      security: [{ bearerAuth: [] }]
      summary: Close competition (no new tournament registrations; idempotent)
      responses:
        "200":
          description: OK — returns competition with isClosed true
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Competition" }
        "403":
          description: Outside admin scope
  /competitions/{id}/event-groups:
    get:
      summary: Event groups in this competition’s age scope
      description: >
        Public. Returns active `EventGroup` rows (with `ageCategory`) whose age band overlaps at least one
        of this competition’s linked age categories, using inclusive `ageFrom`/`ageTo` (null = unbounded).
        If the competition has no linked age categories, all active event groups are returned.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EventGroup" }
        "404":
          description: Competition not found
  /competitions/{id}/aggregate-results:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      security: [{ bearerAuth: [] }]
      summary: Get organization-level aggregate results (1st/2nd/3rd)
      description: >
        Same manage scope as patching the competition. Returns ranked units: training centers (district-level
        competition), districts (state-level), or states (national). `firstPlace` is at most one row; second and
        third may list ties.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompetitionAggregateResultsResponse" }
        "403":
          description: Outside admin scope
        "404":
          description: Competition not found
    post:
      security: [{ bearerAuth: [] }]
      summary: Set or replace aggregate competition results
      description: >
        Replaces all rows for this competition. Exactly one `firstPlace` id; `secondPlace` and `thirdPlace` are
        arrays (may be empty) allowing multiple units at 2nd and 3rd. All ids must sit within the competition’s
        geography. District-level → training center ids; state-level → district ids; national → state ids.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompetitionAggregateResultsBody" }
      responses:
        "201":
          description: Created — current standings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompetitionAggregateResultsResponse" }
        "400":
          description: Validation or geography mismatch
        "403":
          description: Outside admin scope
        "404":
          description: Competition not found
  /competitions/{id}/eligible-players:
    get:
      security: [{ bearerAuth: [] }]
      summary: Players matching hierarchy, competition gender/geo, and event-group rules
      description: >
        Requires lower-level completion in the competition calendar year when applicable (district before state,
        state before national), with participation and tournament attendance marked present. Without `eventId`,
        includes players eligible for at least one linked competition event (age/gender per event group). With
        `eventId`, narrows to that catalog event's age band and event-group gender.
        Training-center users: for `DISTRICT`-level competitions only, results are limited to active players in the
        training center's district (any accepted player in that district); for higher-level competitions the list is empty.
        When `eventId` is set, players who already have a participation record for that catalog event in this
        competition are omitted. For catalog Fari Soti / Single Soti events, players who have the opposite
        Soti type in this competition are also omitted (mutual exclusion).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: eventId
          in: query
          required: false
          schema: { type: string }
          description: Catalog `Event.id` (all active events apply to every competition)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EligiblePlayerSummary" }
        "400":
          description: Competition closed
        "403":
          description: Training center context missing
        "404":
          description: Competition not found
  /competitions/{id}/participations/bulk:
    post:
      security: [{ bearerAuth: [] }]
      summary: Bulk record participation for multiple catalog events
      description: >
        Each item targets one catalog `Event` (`eventId`) with `playerUserIds` (one for individual
        events, team size between event min/max for team events). Enforces hierarchy by competition `createdAt` year,
        max two events per player in this competition (e.g. team and/or Single Soti, or team and/or Fari Soti; Fari and
        Single Soti are mutually exclusive), at most one Individual Single Soti per event group, and team size bounds. All
        items validated before any insert.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 30
                  items:
                    type: object
                    required: [eventId, playerUserIds]
                    properties:
                      eventId: { type: string }
                      playerUserIds:
                        type: array
                        minItems: 1
                        maxItems: 32
                        items: { type: string }
      responses:
        "201":
          description: All created
        "400":
          description: Competition closed or validation failed
  /competitions/{id}/participations:
    post:
      security: [{ bearerAuth: [] }]
      summary: Record participation for one catalog event (team or individual)
      description: >
        Creates `ParticipationRecord` rows for catalog `eventId` and each `playerUserId`. Same business rules as bulk.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventId, playerUserIds]
              properties:
                eventId: { type: string }
                playerUserIds:
                  type: array
                  minItems: 1
                  maxItems: 32
                  items: { type: string }
      responses:
        "201":
          description: Created
        "400":
          description: >
            Closed competition, eligibility, gender, geo, age, caps, team size, or Fari/Single Soti mutual exclusion
            (`FARI_SOTI_BLOCKS_SINGLE_SOTI`, `SINGLE_SOTI_BLOCKS_FARI_SOTI`).
        "403":
          description: Role/level mismatch or player outside registrar scope
        "409":
          description: Player already in this event or duplicate single-soti in group
  /competitions/{id}/players-not-participated:
    get:
      security: [{ bearerAuth: [] }]
      summary: Eligible players who can still register for at least one event (scoped)
      description: >
        Players with ACTIVE status, not blacklisted/TC-disabled, within competition geography (enabled states/districts),
        matching competition-level gender and at least one linked event's event-group age/gender, passing hierarchy
        rules for this competition year, and **not** saturated (still able to register some allowed event given caps).
        Scoped to the caller's hierarchy. Omits players who already filled all allowed slots.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK (envelope with paginated items)
        "400":
          description: Competition closed
  /competitions/{id}/participants:
    get:
      security: [{ bearerAuth: [] }]
      summary: List participants (participation records) for a competition
      description: >
        Paginated `ParticipationRecord` rows with `participated` true, including nested player profile summary.
        Scoped to the caller's hierarchy the same way as player lists (national sees all, others see their geography).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK (envelope with paginated items)
  /tournament-registrations:
    post:
      security: [{ bearerAuth: [] }]
      summary: Register player for competition event
  /tournament-registrations/{id}/finalize-payment:
    post:
      security: [{ bearerAuth: [] }]
      summary: Start Razorpay payment for final tournament submit
  /camps:
    get:
      summary: List camps (paginated)
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: name
          in: query
          required: false
          description: Case-insensitive substring match on camp name
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CampListResponse" }
    post:
      security: [{ bearerAuth: [] }]
      summary: Create camp (level from admin role; multi state/district scope)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CampCreateBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Camp" }
  /camps/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update camp (scoped admins; not when closed)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CampPatchBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Camp" }
        "400":
          description: Closed camp
        "403":
          description: Outside admin scope
  /camps/{id}/close:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      security: [{ bearerAuth: [] }]
      summary: Close camp (no new registrations; idempotent)
      responses:
        "200":
          description: OK — returns camp with isClosed true
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Camp" }
        "403":
          description: Outside admin scope
  /camps/{id}/register:
    post:
      security: [{ bearerAuth: [] }]
      summary: Register for camp
      description: >
        Allowed only if current time is within registration window, your `User.role` is in
        `allowedSignupRoles`, and (when the camp lists states/districts) your profile geography matches scope.
        Registration is recorded immediately (no camp fee).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "201":
          description: Created — camp registration row
  /attendance:
    post:
      security: [{ bearerAuth: [] }]
      summary: Mark attendance
      description: >
        Allowed roles: COACH, TRAINING_CENTER, DISTRICT_ADMIN, STATE_ADMIN, NATIONAL_ADMIN.
        Body `type` selects context: use `competitionId` for TOURNAMENT, `campId` for CAMP, `trainingCenterId` for TC_DAILY as needed.
        There is at most one row per subject user per calendar `date`. A repeat call for the same `userId` and `date` updates
        that row (latest payload wins) and returns 200; first write returns 201.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AttendanceMarkRequest" }
      responses:
        "201":
          description: Created a new attendance row for this user and date
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Attendance" }
        "200":
          description: Updated existing attendance for this user and date
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Attendance" }
        "400":
          description: Validation error
        "401":
          description: Missing or invalid JWT
        "403":
          description: Role cannot mark attendance
  /attendance/bulk:
    post:
      security: [{ bearerAuth: [] }]
      summary: Bulk mark attendance
      description: >
        Same roles and per-item rules as `POST /attendance`. Request body is 1–500 items; each item has the same shape as
        a single mark. All rows are written in **one transaction** (all commit or all roll back). Response `results` are in
        the same order as `items`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AttendanceBulkMarkRequest" }
      responses:
        "200":
          description: OK — per-item `created` flag and final `attendance` row
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttendanceBulkMarkResponse" }
        "400":
          description: Validation error (e.g. empty or too many items)
        "401":
          description: Missing or invalid JWT
        "403":
          description: Role cannot mark attendance
  /attendance/report:
    get:
      security: [{ bearerAuth: [] }]
      summary: Player attendance report (training center, competition, or camp)
      description: >
        Same roles as marking attendance. Exactly one of:
        (1) `trainingCenterId` and `date` — all **players** in that TC: **present** if that day’s row is `TC_DAILY`, same
        `trainingCenterId`, and `present` (see `isPresent`); **absent** otherwise (same-day row may still be returned for
        other contexts e.g. tournament);
        (2) `competitionId`, optional `eventId` (only players who participated in that event), optional `date` — **present**
        if TOURNAMENT attendance for this competition is marked `present` (for that day if `date` is set, or any day if
        omitted); **absent** = participated but not present per those rules, with `participations` for context;
        (3) `campId`, optional `date` — **players** registered for the camp: **present** for `CAMP`+`present` (that day
        or any day with `date` omitted); **absent** = registered but not in the present set.
      parameters:
        - in: query
          name: trainingCenterId
          schema: { type: string }
          description: Use with `date` (mutually exclusive with `competitionId` / `campId`).
        - in: query
          name: date
          schema: { type: string, format: date }
          description: Calendar date (YYYY-MM-DD). Required for `trainingCenterId`; optional for competition/camp to scope to that day in UTC.
        - in: query
          name: competitionId
          schema: { type: string }
        - in: query
          name: eventId
          schema: { type: string }
          description: Catalog event id; requires `competitionId`; limits to players with participation in that event.
        - in: query
          name: campId
          schema: { type: string }
      responses:
        "200":
          description: OK — body includes `kind` discriminator
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/AttendanceReportTrainingCenter" }
                  - { $ref: "#/components/schemas/AttendanceReportCompetition" }
                  - { $ref: "#/components/schemas/AttendanceReportCamp" }
        "400":
          description: Invalid or ambiguous query
        "401":
          description: Missing or invalid JWT
        "403":
          description: Role cannot view report
  /attendance/user/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: string }
    get:
      security: [{ bearerAuth: [] }]
      summary: List attendance for a user
      description: >
        Returns up to 200 rows newest-first. If the caller is a PLAYER, `userId` must be the current user.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Attendance" }
        "401":
          description: Missing or invalid JWT
        "403":
          description: Player may not list another user
  /attendance/competition/{competitionId}/summary:
