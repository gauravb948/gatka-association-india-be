      security: [{ bearerAuth: [] }]
      summary: Register player for competition event
  /tournament-registrations/{id}/finalize-payment:
    post:
      security: [{ bearerAuth: [] }]
      summary: Start Razorpay payment for final tournament submit
  /camps:
    get:
      summary: List camps (paginated)
      parameters:
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: name
          in: query
          required: false
          description: Case-insensitive substring match on camp name
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CampListResponse" }
    post:
      security: [{ bearerAuth: [] }]
      summary: Create camp (level from admin role; multi state/district scope)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CampCreateBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Camp" }
  /camps/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update camp (scoped admins; not when closed)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CampPatchBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Camp" }
        "400":
          description: Closed camp
        "403":
          description: Outside admin scope
  /camps/{id}/close:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      security: [{ bearerAuth: [] }]
      summary: Close camp (no new registrations; idempotent)
      responses:
        "200":
          description: OK — returns camp with isClosed true
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Camp" }
        "403":
          description: Outside admin scope
  /camps/{id}/register:
    post:
      security: [{ bearerAuth: [] }]
      summary: Register for camp
      description: >
        Allowed only if current time is within registration window, your `User.role` is in
        `allowedSignupRoles`, and (when the camp lists states/districts) your profile geography matches scope.
        Registration is recorded immediately (no camp fee).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "201":
          description: Created — camp registration row
  /attendance:
    post:
      security: [{ bearerAuth: [] }]
      summary: Mark attendance
      description: >
        Allowed roles: COACH, TRAINING_CENTER, DISTRICT_ADMIN, STATE_ADMIN, NATIONAL_ADMIN.
        Body `type` selects context: use `competitionId` for TOURNAMENT, `campId` for CAMP, `trainingCenterId` for TC_DAILY as needed.
        There is at most one row per subject user per calendar `date`. A repeat call for the same `userId` and `date` updates
        that row (latest payload wins) and returns 200; first write returns 201.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AttendanceMarkRequest" }
      responses:
        "201":
          description: Created a new attendance row for this user and date
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Attendance" }
        "200":
          description: Updated existing attendance for this user and date
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Attendance" }
        "400":
          description: Validation error
        "401":
          description: Missing or invalid JWT
        "403":
          description: Role cannot mark attendance
  /attendance/bulk:
    post:
      security: [{ bearerAuth: [] }]
      summary: Bulk mark attendance
      description: >
        Same roles and per-item rules as `POST /attendance`. Request body is 1–500 items; each item has the same shape as
        a single mark. All rows are written in **one transaction** (all commit or all roll back). Response `results` are in
        the same order as `items`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AttendanceBulkMarkRequest" }
      responses:
        "200":
          description: OK — per-item `created` flag and final `attendance` row
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttendanceBulkMarkResponse" }
        "400":
          description: Validation error (e.g. empty or too many items)
        "401":
          description: Missing or invalid JWT
        "403":
          description: Role cannot mark attendance
  /attendance/report:
    get:
      security: [{ bearerAuth: [] }]
      summary: Player attendance report (training center, competition, or camp)
      description: >
        Same roles as marking attendance. Exactly one of:
        (1) `trainingCenterId` and `date` — all **players** in that TC: **present** if that day’s row is `TC_DAILY`, same
        `trainingCenterId`, and `present` (see `isPresent`); **absent** otherwise (same-day row may still be returned for
        other contexts e.g. tournament);
        (2) `competitionId`, optional `eventId` (only players who participated in that event), optional `date` — **present**
        if TOURNAMENT attendance for this competition is marked `present` (for that day if `date` is set, or any day if
        omitted); **absent** = participated but not present per those rules, with `participations` for context;
        (3) `campId`, optional `date` — **players** registered for the camp: **present** for `CAMP`+`present` (that day
        or any day with `date` omitted); **absent** = registered but not in the present set.
      parameters:
        - in: query
          name: trainingCenterId
          schema: { type: string }
          description: Use with `date` (mutually exclusive with `competitionId` / `campId`).
        - in: query
          name: date
          schema: { type: string, format: date }
          description: Calendar date (YYYY-MM-DD). Required for `trainingCenterId`; optional for competition/camp to scope to that day in UTC.
        - in: query
          name: competitionId
          schema: { type: string }
        - in: query
          name: eventId
          schema: { type: string }
          description: Catalog event id; requires `competitionId`; limits to players with participation in that event.
        - in: query
          name: campId
          schema: { type: string }
      responses:
        "200":
          description: OK — body includes `kind` discriminator
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/AttendanceReportTrainingCenter" }
                  - { $ref: "#/components/schemas/AttendanceReportCompetition" }
                  - { $ref: "#/components/schemas/AttendanceReportCamp" }
        "400":
          description: Invalid or ambiguous query
        "401":
          description: Missing or invalid JWT
        "403":
          description: Role cannot view report
  /attendance/user/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: string }
    get:
      security: [{ bearerAuth: [] }]
      summary: List attendance for a user
      description: >
        Returns up to 200 rows newest-first. If the caller is a PLAYER, `userId` must be the current user.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Attendance" }
        "401":
          description: Missing or invalid JWT
        "403":
          description: Player may not list another user
  /attendance/competition/{competitionId}/summary:
    parameters:
      - name: competitionId
        in: path
        required: true
        schema: { type: string }
    get:
      security: [{ bearerAuth: [] }]
      summary: Tournament attendance rows for a competition
      description: >
        Returns `type` TOURNAMENT attendance for the competition, including subject `user` (id, email).
        Allowed roles: DISTRICT_ADMIN, STATE_ADMIN, NATIONAL_ADMIN.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AttendanceTournamentListItem" }
        "401":
          description: Missing or invalid JWT
        "403":
          description: Forbidden for this role
  /results:
    get:
      security: [{ bearerAuth: [] }]
      summary: List competition results (dashboard table)
      description: >
        Paginated per-event aggregate results from `CompetitionAggregateStanding`. For each competition
        that has at least one saved result, returns one row for every event in the competition's age scope
        (including events without winners yet). Gold/silver/bronze are unit names for ranks 1/2/3.
        Scoped to the caller's admin hierarchy.
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
        - in: query
          name: search
          schema: { type: string }
          description: Case-insensitive substring match on competition name
        - in: query
          name: competitionId
          schema: { type: string }
          description: Optional filter to a single competition
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResultListResponse" }
        "401":
          description: Unauthorized
        "403":
          description: Forbidden for this role
    post:
      security: [{ bearerAuth: [] }]
      summary: Upsert result + QR payload
  /results/competition/{competitionId}/export.pdf:
    get:
      security: [{ bearerAuth: [] }]
      summary: PDF export
  /results/competition/{competitionId}/export.xlsx:
    get:
      security: [{ bearerAuth: [] }]
      summary: Excel export (age/event group columns)
  /notices/inbox:
    get:
      security: [{ bearerAuth: [] }]
      summary: Scoped notice inbox
  /migration/request:
    post:
      security: [{ bearerAuth: [] }]
      summary: Player migration request
  /complaints:
    post:
      security: [{ bearerAuth: [] }]
      summary: Raise complaint
  /verify/qr:
    get:
      summary: Verify certificate QR JSON payload (query param payload)
      parameters:
        - in: query
          name: payload
          schema:
            type: string
  /admin/users:
    get:
      security: [{ bearerAuth: [] }]
      summary: List users with pagination (national admin)
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: status
          schema: { type: string }
          description: Filter by `EntityStatus`; comma-separated and/or repeat (e.g. `PENDING,ACCEPTED`).
        - in: query
          name: userType
          schema: { type: string }
          description: Filter by user role; comma-separated and/or repeat (e.g. `PLAYER,COACH`). Maps to `User.role`.
      responses:
        "200":
          description: OK (envelope `data` holds this object)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/AdminUserListResponse" }
    post:
      security: [{ bearerAuth: [] }]
      summary: Create admin user (national)
  /users/players/by-state/{stateId}:
    get:
      security: [{ bearerAuth: [] }]
      summary: List players in a state (hierarchy-scoped, paginated)
      description: >
        Same rules and response shape as `GET /users/players` with `stateId` set to the path parameter.
        Training centers may only use their own state's id. Returns 404 if the state id does not exist.
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
        - $ref: "#/components/parameters/userListStatus"
        - $ref: "#/components/parameters/userListDistrictId"
        - $ref: "#/components/parameters/userListTrainingCenterId"
      responses:
        "200":
          description: OK (envelope `data` holds this object; includes `stateId` echo)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data:
                    allOf:
                      - { $ref: "#/components/schemas/HierarchyUserListResponse" }
                      - type: object
                        properties:
                          stateId: { type: string }
        "404":
          description: State not found
  /users/players:
    get:
      security: [{ bearerAuth: [] }]
      summary: List players (hierarchy-scoped, paginated)
      description: Visibility follows the caller — national (all), state (state), district (district), training center (that center only). Optional `stateId` / `districtId` / `trainingCenterId` narrow further when allowed.
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
        - $ref: "#/components/parameters/userListStatus"
        - $ref: "#/components/parameters/userListStateId"
        - $ref: "#/components/parameters/userListDistrictId"
        - $ref: "#/components/parameters/userListTrainingCenterId"
      responses:
        "200":
          description: OK (envelope `data` holds this object)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/HierarchyUserListResponse" }
  /users/coaches:
    get:
      security: [{ bearerAuth: [] }]
