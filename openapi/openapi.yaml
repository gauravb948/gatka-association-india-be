                      stateId: { type: string }
                      razorpayKeyId: { type: string }
                      updatedAt: { type: string, format: date-time }
        "403":
          description: Not state admin or wrong state
  /payments/state-configs:
    get:
      security: [{ bearerAuth: [] }]
