    post:
      summary: Presign PUT upload to Cloudflare R2 (public)
      description: |
        Returns a short-lived `uploadUrl` for direct PUT to R2 and a `publicUrl` to store after upload.
        Stricter per-IP rate limit than general API; no authentication required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/R2PresignPutRequest"
