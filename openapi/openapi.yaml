  /users/referees/public:
    get:
      summary: List accepted referees (public)
      description: >
        Active users with role REFEREE, EntityStatus ACCEPTED, not blacklisted.
        Pagination via `page` and `pageSize` (defaults 1 and 50, max pageSize 200).
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/PublicRefereesDirectoryResponse" }
  /users/referees:
    get:
      security: [{ bearerAuth: [] }]
      summary: List referees (hierarchy-scoped, paginated)
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
        - $ref: "#/components/parameters/userListStatus"
        - $ref: "#/components/parameters/userListStateId"
        - $ref: "#/components/parameters/userListDistrictId"
        - $ref: "#/components/parameters/userListTrainingCenterId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/HierarchyUserListResponse" }
  /volunteer-registrations:
    get:
      security: [{ bearerAuth: [] }]
      summary: List volunteer registrations (national, state, or district admin)
      description: >
        Volunteers submit via `POST /auth/register/volunteer` and cannot sign in.
        National admin sees all; state admin is scoped to their state; district admin to their district.
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: stateId
          schema: { type: string }
          description: Filter by state (must be within caller scope)
        - in: query
          name: districtId
          schema: { type: string }
          description: Filter by district (must be within caller scope)
        - in: query
          name: gender
          schema: { $ref: "#/components/schemas/Gender" }
        - in: query
          name: maritalStatus
          schema: { $ref: "#/components/schemas/MaritalStatus" }
        - in: query
          name: hasDisability
          schema: { type: string, enum: ["true", "false"] }
        - in: query
          name: status
          schema: { $ref: "#/components/schemas/VolunteerRegistrationStatus" }
        - in: query
          name: search
          schema: { type: string }
          description: Matches full name, email, or phone
        - in: query
          name: createdFrom
          schema: { type: string, format: date-time }
        - in: query
          name: createdTo
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: OK (envelope `data` holds this object)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/VolunteerRegistrationListResponse" }
  /volunteer-registrations/{id}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get volunteer registration by id (national, state, or district admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK (envelope `data` holds the registration)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/VolunteerRegistration" }
        "404":
