          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          description: Calendar date (YYYY-MM-DD); server normalizes to UTC date.
        present: { type: boolean, default: true }
        type: { $ref: "#/components/schemas/AttendanceType" }
