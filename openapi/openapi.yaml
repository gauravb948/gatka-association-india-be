            - { $ref: "#/components/schemas/CompetitionCreator" }
        states:
          type: array
          items: { $ref: "#/components/schemas/CompetitionStateLink" }
        districts:
          type: array
          items: { $ref: "#/components/schemas/CompetitionDistrictLink" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CompetitionAggregateResultsBody:
      type: object
      required: [eventId, firstPlace, secondPlace, thirdPlace]
      properties:
        eventId:
          type: string
          description: Catalog event id within this competition's age scope
        firstPlace:
          type: string
          description: Id of the single winning unit (may also appear in second/third).
        secondPlace:
          type: array
          items: { type: string }
          description: Unit ids in second place (may be empty; may overlap with first/third).
        thirdPlace:
          type: array
          items: { type: string }
          description: Unit ids in third place (may be empty; may overlap with first/second).
      description: >
        Replaces aggregate standings for one event. Exactly one `firstPlace` winner; the same unit
        may also appear in `secondPlace` and/or `thirdPlace`. District-level competitions rank training
        centers; state-level rank districts; national rank states.
    CompetitionAggregateStandingRow:
      type: object
      properties:
        id: { type: string }
        eventId: { type: string }
        rankBand: { type: integer, enum: [1, 2, 3] }
        unitType: { type: string, enum: [TRAINING_CENTER, DISTRICT, STATE] }
        unitId: { type: string }
        tieOrder: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy:
          nullable: true
          type: object
          properties:
            id: { type: string }
            email: { type: string }
            role: { type: string }
        unit:
          description: Resolved training center, district, or state record
          nullable: true
          type: object
    CompetitionAggregateResultsResponse:
      type: object
      required: [competitionId, level, unitType, events]
      properties:
        competitionId: { type: string }
        level: { type: string, enum: [DISTRICT, STATE, NATIONAL] }
        unitType: { type: string, enum: [TRAINING_CENTER, DISTRICT, STATE] }
        events:
          type: array
          items:
            type: object
            required: [eventId, event, ageGroup, eventGroup, firstPlace, secondPlace, thirdPlace]
            properties:
              eventId: { type: string }
              event: { type: string }
              ageGroup: { type: string }
              eventGroup: { type: string }
              firstPlace:
                type: array
                items: { $ref: "#/components/schemas/CompetitionAggregateStandingRow" }
              secondPlace:
                type: array
                items: { $ref: "#/components/schemas/CompetitionAggregateStandingRow" }
              thirdPlace:
                type: array
                items: { $ref: "#/components/schemas/CompetitionAggregateStandingRow" }
    ResultListItem:
      type: object
      required:
        [srNo, competitionId, eventId, competition, ageGroup, eventGroup, event, gold, silver, bronze, date]
      properties:
        srNo: { type: integer, minimum: 1 }
        competitionId: { type: string }
        eventId: { type: string }
        competition: { type: string }
        ageGroup: { type: string }
        eventGroup: { type: string, description: "e.g. Saif (Male)" }
        event: { type: string }
        gold:
          type: string
          nullable: true
          description: Single first-place unit name
        silver:
          type: string
          nullable: true
          description: Single second-place unit name
        bronze:
          type: array
          items: { type: string }
          description: Third-place unit names
        date:
          type: string
          format: date-time
          nullable: true
          description: Latest aggregate standing update for this event, if any
    ResultListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ResultListItem" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    CompetitionRegistrationStatItem:
      type: object
      required:
        [srNo, competitionId, competition, total, men, women, boys, girls]
      properties:
        srNo: { type: integer, minimum: 1 }
        competitionId: { type: string }
        competition: { type: string }
        total:
          type: integer
          minimum: 0
          description: Distinct participating players in this competition
        men:
          type: integer
          minimum: 0
          description: Senior-band male players (AgeCategory.bandType SENIOR, VETERAN, or OPEN)
        women:
          type: integer
          minimum: 0
          description: Senior-band female players
        boys:
          type: integer
          minimum: 0
          description: Junior-band male players (SUB_JUNIOR or JUNIOR)
        girls:
          type: integer
          minimum: 0
          description: Junior-band female players
    CompetitionRegistrationsReportResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CompetitionRegistrationStatItem" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    CompetitionEventRegistrationReportItem:
      type: object
      required: [eventName, minPlayers, maxPlayers, playersRegistered]
      properties:
        eventName: { type: string }
        minPlayers: { type: integer, minimum: 0 }
        maxPlayers: { type: integer, minimum: 0 }
        playersRegistered:
          type: integer
          minimum: 0
          description: Distinct players registered for this event
    CompetitionEventRegistrationReport:
      type: object
      description: >
        Keys are event group labels (e.g. `Bhujhang (Male)`). Values are catalog events
        in that group with registration counts.
      additionalProperties:
        type: array
        items: { $ref: "#/components/schemas/CompetitionEventRegistrationReportItem" }
    CompetitionEventGroupParticipantRow:
      type: object
      required:
        [name, fatherName, motherName, dob, age, aadharNumber, participatingIn]
      properties:
        name: { type: string }
        fatherName: { type: string, nullable: true }
        motherName: { type: string, nullable: true }
        dob:
          type: string
          description: Date of birth formatted as MM/DD/YYYY (UTC)
          example: "05/14/2010"
        age:
          type: integer
          minimum: 0
          description: Age as of the competition `ageTillDate`, or today when unset
        aadharNumber: { type: string, nullable: true }
        participatingIn:
          type: array
          items: { type: string }
          description: Event names the player is registered for in this event group
    CompetitionEventGroupParticipantsReport:
      type: object
      description: >
        Keys are event group labels (e.g. `Saif (Male)`). Values are participant rows,
        sorted by name. Each player appears once per group even if registered for
        multiple events in that group.
      additionalProperties:
        type: array
        items: { $ref: "#/components/schemas/CompetitionEventGroupParticipantRow" }
    AgeWiseReportRow:
      type: object
      required:
        - district
        - teamDemo
