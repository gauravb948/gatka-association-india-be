        teamDemo:
          type: integer
          minimum: 0
        teamFariSoti:
          type: integer
          minimum: 0
        teamSingleSoti:
          type: integer
          minimum: 0
        indvDemo:
          type: integer
          minimum: 0
        indvFariSoti:
          type: integer
          minimum: 0
        indvSingleSoti:
          type: integer
          minimum: 0
    CompetitionAgeWiseReport:
