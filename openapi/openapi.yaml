    post:
      summary: Upload image to Cloudflare R2 via backend (public)
      description: |
        Send `multipart/form-data` with field `file`. Backend uploads to R2 and returns `{ key, publicUrl }`.
        Rate limited per IP; no authentication required.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                prefix:
                  type: string
      responses:
        "201":
          description: Uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  key: { type: string }
                  publicUrl: { type: string, format: uri }
