          minItems: 1
          items: { type: string }
        districtIds:
          type: array
          minItems: 1
          items: { type: string }
        startDate: { type: string }
        endDate: { type: string }
        registrationOpensAt: { type: string }
        registrationClosesAt: { type: string }
        ageTillDate: { type: string }
        ageCategoryIds:
          type: array
          minItems: 1
          items: { type: string }
