        - name
        - venue
        - genders
        - stateIds
        - districtIds
        - startDate
        - endDate
        - registrationOpensAt
        - registrationClosesAt
        - ageTillDate
        - ageCategoryIds
      properties:
        name: { type: string }
        venue: { type: string }
        genders:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/Gender" }
        ageCategoryIds:
          type: array
          minItems: 1
          items: { type: string }
        stateIds:
          type: array
          minItems: 1
          items: { type: string }
        districtIds:
          type: array
          minItems: 1
          items: { type: string }
        startDate:
          type: string
          description: ISO date or date-time (competition start)
        endDate:
          type: string
          description: ISO date or date-time (competition end)
        registrationOpensAt:
          type: string
          description: ISO date or date-time
        registrationClosesAt:
          type: string
          description: ISO date or date-time
        ageTillDate:
