                  data: { $ref: "#/components/schemas/DistrictRegistrationAuthResponse" }
        "200":
          description: Resubmitted pending registration; JWT refreshed (envelope wraps this payload in `data`)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/DistrictRegistrationAuthResponse" }
    get:
      security: [{ bearerAuth: [] }]
      summary: List district registrations with pagination (national all; state admin scoped to their state)
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: status
          schema: { type: string }
          description: Filter by registration status; comma-separated and/or repeat (e.g. `PENDING,ACCEPTED`).
      responses:
        "200":
          description: OK (envelope `data` holds this object)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/DistrictRegistrationListResponse" }
