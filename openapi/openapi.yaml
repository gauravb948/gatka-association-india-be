          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/HierarchyUserListResponse" }
  /users/officials:
    get:
      security: [{ bearerAuth: [] }]
      summary: List accepted officials — coaches and referees (hierarchy-scoped, paginated)
      description: >
        Returns users with role COACH and/or REFEREE, EntityStatus ACCEPTED only,
        visible to the caller's hierarchy. Optional `userType` query filters to
        `COACH`, `REFEREE`, or comma-separated both.
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
        - $ref: "#/components/parameters/userListStateId"
        - $ref: "#/components/parameters/userListDistrictId"
        - $ref: "#/components/parameters/userListTrainingCenterId"
        - in: query
          name: userType
          schema:
            type: string
            description: "Optional filter: COACH, REFEREE, or COACH,REFEREE"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data:
                    allOf:
                      - $ref: "#/components/schemas/AdminUserListResponse"
