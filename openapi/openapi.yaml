        imageUrl: { type: string, format: uri, nullable: true }
        name: { type: string }
        message: { type: string }
        designation: { type: string, nullable: true }
        stateId: { type: string }
    MessagePatch:
      type: object
      properties:
        imageUrl: { type: string, format: uri, nullable: true }
        name: { type: string }
        message: { type: string }
        designation: { type: string, nullable: true }
    StatusChangeRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
    TrainingCenterStatusChangeRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACCEPTED, REJECTED, BLOCKED]
        statusReason:
          type: string
          nullable: true
          description: Required when status is REJECTED or BLOCKED
    StateRegistrationCreate:
      type: object
      required:
        [stateId, firstName, lastName, userName, email, password, mobileNo, address]
      properties:
        stateId: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        userName: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, format: uri, nullable: true }
    DistrictRegistrationCreate:
      type: object
      required:
        [
          stateId,
          districtId,
          firstName,
          lastName,
          userName,
          email,
          password,
          mobileNo,
          address,
        ]
      properties:
        stateId: { type: string, description: "Must match the district's state" }
        districtId: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        userName: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, format: uri, nullable: true }
    StateRegistration:
      type: object
      description: Password is stored only on the linked User account, not on this row
      properties:
        id: { type: string }
        stateId: { type: string }
        userId: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        userName: { type: string }
        email: { type: string, format: email }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        state:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            code: { type: string }
            isEnabled: { type: boolean }
        user:
          allOf:
            - $ref: "#/components/schemas/RegistrationApplicantUser"
          nullable: true
    RegistrationPaymentSummary:
      type: object
      description: Non-sensitive payment row linked to a registration
      properties:
        id: { type: string }
        purpose: { type: string }
        amountPaise: { type: integer }
        currency: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DistrictRegistrationNestedSummary:
      description: District-body registration nested under a state’s district (no nested district/state)
      type: object
      properties:
        id: { type: string }
        districtId: { type: string }
        stateId: { type: string }
        userId: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        userName: { type: string }
        email: { type: string, format: email }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DistrictWithOptionalDistrictRegistration:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        isEnabled: { type: boolean }
        registration:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/DistrictRegistrationNestedSummary"
    StateWithDistrictRegistrations:
      description: State with ordered districts; each district may include its body registration
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string }
        isEnabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        districts:
          type: array
          items: { $ref: "#/components/schemas/DistrictWithOptionalDistrictRegistration" }
    StateBodyRegistrationSnapshot:
      description: Parent state’s own body registration (`State.registration`), when present
      type: object
      properties:
        id: { type: string }
        stateId: { type: string }
        userId: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        userName: { type: string }
        email: { type: string, format: email }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        user:
          allOf:
            - $ref: "#/components/schemas/RegistrationApplicantUser"
          nullable: true
    StateWithStateBodyRegistration:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string }
        isEnabled: { type: boolean }
        registration:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/StateBodyRegistrationSnapshot"
    StateRegistrationDetail:
      description: >
        `GET /state-registrations/state/{stateId}` includes optional `payment`, applicant `user`,
        and `state` with all `districts` (each may include `registration` for the district body).
      allOf:
        - $ref: "#/components/schemas/StateRegistration"
        - type: object
          properties:
            payment:
              nullable: true
              $ref: "#/components/schemas/RegistrationPaymentSummary"
            state:
              nullable: true
              $ref: "#/components/schemas/StateWithDistrictRegistrations"
    DistrictRegistrationDetail:
      description: >
        `GET /district-registrations/district/{districtId}` includes optional `payment`, applicant `user`,
        and `state.registration` for the parent state’s body registration when present.
      allOf:
        - $ref: "#/components/schemas/DistrictRegistration"
        - type: object
          properties:
            payment:
              nullable: true
              $ref: "#/components/schemas/RegistrationPaymentSummary"
            state:
              nullable: true
              $ref: "#/components/schemas/StateWithStateBodyRegistration"
    StateRegistrationListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/StateRegistration" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    DistrictRegistration:
      type: object
      description: Password is stored only on the linked User account, not on this row
      properties:
        id: { type: string }
        stateId: { type: string }
        districtId: { type: string }
        userId: { type: string, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        userName: { type: string }
        email: { type: string, format: email }
        mobileNo: { type: string }
        address: { type: string }
        passportPhotoUrl: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/EntityStatus" }
        statusReason: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        state:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            code: { type: string }
            isEnabled: { type: boolean }
        district:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            stateId: { type: string }
            isEnabled: { type: boolean }
        user:
          allOf:
            - $ref: "#/components/schemas/RegistrationApplicantUser"
          nullable: true
    DistrictRegistrationListResponse:
      type: object
      required: [items, page, pageSize, total, totalPages]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/DistrictRegistration" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: JWT and full user context for the client (no password)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /auth/me:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get current user by token (fresh DB snapshot)
      responses:
        "200":
          description: OK (envelope wraps this payload in `data`)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      user: { $ref: "#/components/schemas/LoginUser" }
  /auth/register/player:
    post:
      summary: Self-register player (pending payment until webhook)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPlayerRequest"
      responses:
        "201":
          description: Created
  /auth/register/coach:
    post:
      summary: Self-register coach (pending approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCoachRequest"
      responses:
        "201":
          description: Created
  /auth/register/referee:
    post:
      summary: Self-register referee (pending approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRefereeRequest"
      responses:
        "201":
          description: Created
  /auth/register/volunteer:
    post:
      summary: Self-register volunteer (pending approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterVolunteerRequest"
      responses:
        "201":
          description: Created
  /auth/register/training-center:
    post:
      summary: Register training center + login user (pending approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterTrainingCenterRequest"
      responses:
        "201":
          description: Created
  /auth/otp/request:
    post:
      summary: Request password reset OTP (SMS queued if phone on file)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phoneOrEmail:
                  type: string
  /auth/otp/confirm:
    post:
      summary: Confirm OTP and set new password
      requestBody:
        content:
          application/json:
            schema:
              type: object
  /states/public:
    get:
      summary: List enabled states where state-body registration is not created yet (public, paginated)
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPublicStateListResponse"
  /states/public/registration-accepted:
    get:
      summary: List enabled states with ACCEPTED state-body registration and payment config (public, paginated)
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPublicStateListResponse"
  /states:
    get:
      security: [{ bearerAuth: [] }]
      summary: List all states (national admin, paginated)
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedStateListResponse"
    post:
      security: [{ bearerAuth: [] }]
      summary: Create state (national admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StateCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/State" }
  /states/{id}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get state by id (nested relations; national admin or state admin for own state)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StateDetailResponse" }
        "403":
          description: Forbidden
        "404":
          description: State not found
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update state — enable/disable, rename (national admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StatePatch" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/State" }
  /states/{id}/payment-config:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get Razorpay config metadata for state (state admin, own state only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatePaymentConfigResponse" }
        "404":
          description: Not found
    put:
      security: [{ bearerAuth: [] }]
      summary: Upsert per-state Razorpay keys and webhook secret (state admin, own state only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StatePaymentConfigPut" }
      responses:
        "200":
          description: Upserted
  /districts/public/by-state/{stateId}/registration-accepted:
    get:
      summary: List enabled districts whose district-body registration is ACCEPTED (public, paginated)
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPublicDistrictListResponse"
  /districts/public/by-states/registration-accepted:
    post:
      summary: List districts with ACCEPTED district-body registration for multiple states (public)
      description: >
        Returns enabled districts in any of the given states whose linked `DistrictRegistration`
        status is ACCEPTED. Same filter as GET `/districts/public/by-state/{stateId}/registration-accepted`,
        but not paginated. Duplicate state ids in the body are ignored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stateIds]
              properties:
                stateIds:
                  type: array
                  minItems: 1
                  items: { type: string }
      responses:
        "200":
          description: OK — array of id, name, stateId (sorted by stateId, then name)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PublicDistrictListItem" }
  /districts/public/by-state/{stateId}:
    get:
      summary: List enabled districts for state where district registration is not created yet (public, paginated)
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPublicDistrictListResponse"
  /districts/by-state/{stateId}:
    get:
      security: [{ bearerAuth: [] }]
      summary: All districts for state (national/state admin, paginated)
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDistrictListResponse"
  /districts/state/{stateId}:
    post:
      security: [{ bearerAuth: [] }]
      summary: Create district under state (national/state admin)
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DistrictCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/District" }
  /districts/{id}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get district by id (nested relations; national, state admin in-state, or own district admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DistrictDetailResponse" }
        "403":
          description: Forbidden
        "404":
          description: District not found
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update district — enable/disable, rename (national/state admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DistrictPatch" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/District" }
  /training-centers/public/by-district/{districtId}:
    get:
      security: []
      summary: Training centers in a district (public)
      description: >
        Returns only training centers with `status` **ACCEPTED** and `isEnabled` **true** in the given district.
        Minimal fields for signup pickers (`id`, `name`, `districtId`).
      parameters:
        - name: districtId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    name: { type: string }
                    districtId: { type: string }
  /settings/global:
    get:
      security: [{ bearerAuth: [] }]
      summary: Global settings (age calculation date, membership expiry date)
  /settings/global/age-calculation-date:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Set age calculation date (national + super flag)
  /settings/global/membership-expiry-date:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Set membership validity end date for paid registrations (national + super flag)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                membershipExpiryDate:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "200":
          description: Updated global settings
  /settings/role-payment-fees:
    get:
      summary: National registration fee per role (public)
      description: One row per role except NATIONAL_ADMIN. Amounts are in paise (INR).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RolePaymentFeeConfig" }
    patch:
      security: [{ bearerAuth: [] }]
      summary: Upsert role fees (national admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RolePaymentFeesPatchBody" }
      responses:
        "200":
          description: Updated list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RolePaymentFeeConfig" }
  /age-categories:
    get:
      security: []
      summary: List active age categories (public, no authentication)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AgeCategory" }
    post:
      security: [{ bearerAuth: [] }]
      summary: Create age category (national admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgeCategoryBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgeCategory" }
  /age-categories/admin:
    get:
      security: [{ bearerAuth: [] }]
      summary: List all age categories (national admin, paginated)
      parameters:
        - $ref: "#/components/parameters/userListPage"
        - $ref: "#/components/parameters/userListPageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/AgeCategoryAdminListResponse" }
  /age-categories/{id}:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update age category (national admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgeCategoryBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgeCategory" }
    delete:
      security: [{ bearerAuth: [] }]
      summary: Delete age category (national admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }
  /event-groups:
    get:
      summary: Active event groups with age category
  /event-groups/{id}/events:
    get:
      summary: List all events for an event group
      parameters:
        - name: id
          in: path
          required: true
          description: Event group id
          schema: { type: string }
      responses:
        "200":
          description: OK — ordered by sortOrder
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Event" }
        "404":
          description: Event group not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /sessions:
    get:
      summary: Active sessions
  /payments/razorpay/order:
    post:
      security: [{ bearerAuth: [] }]
      summary: Create Razorpay order + payment row
  /payments/verify:
    post:
      security: [{ bearerAuth: [] }]
      summary: Verify Razorpay payment signature and mark paid
      description: >
        After the Razorpay checkout returns on the client, post the three values.
        The server verifies the HMAC-SHA256 signature against the state's key secret,
        marks the payment as PAID, and runs all status transitions (user, registration, membership).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [razorpay_order_id, razorpay_payment_id, razorpay_signature]
              properties:
                razorpay_order_id: { type: string }
                razorpay_payment_id: { type: string }
                razorpay_signature: { type: string }
      responses:
        "200":
          description: OK (envelope `data` holds this object)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      verified: { type: boolean }
                      payment: { type: object }
        "400":
          description: Invalid signature or missing config
  /payments/me:
    get:
      security: [{ bearerAuth: [] }]
