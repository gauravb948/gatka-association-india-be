        "200":
          description: OK (envelope `data` holds this object)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/StatePaymentConfigResponse" }
        "404":
          description: Not found
    put:
      security: [{ bearerAuth: [] }]
      summary: Upsert own state's Razorpay keys and webhook secret (state admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StatePaymentConfigPut" }
      responses:
        "200":
          description: Upserted (envelope `data` holds this object)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      stateId: { type: string }
                      razorpayKeyId: { type: string }
                      updatedAt: { type: string, format: date-time }
  /payments/state-config/{stateId}:
    parameters:
      - name: stateId
        in: path
        required: true
        schema: { type: string }
    get:
      security: [{ bearerAuth: [] }]
      summary: Get Razorpay config metadata for a state by id (state admin, own state only)
      responses:
        "200":
          description: OK (envelope `data` holds this object)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/StatePaymentConfigResponse" }
        "403":
          description: Not state admin or wrong state
        "404":
          description: Not found
    put:
      security: [{ bearerAuth: [] }]
      summary: Upsert Razorpay keys for a state by id (state admin, own state only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StatePaymentConfigPut" }
      responses:
        "200":
          description: Upserted (envelope `data` holds this object)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string }
                  data:
                    type: object
                    properties:
