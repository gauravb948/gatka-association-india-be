      description: Same response as `GET /about-us/public/by-state/{stateId}`; preferred short path.
      parameters:
        - in: path
          name: stateId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AboutUs" }
        "404":
          description: "State not found or no about-us configured"
  /about-us/admin:
    get:
      security: [{ bearerAuth: [] }]
      summary: List about-us entries (national/state admin)
      parameters:
        - in: query
          name: stateId
          required: false
          schema:
            type: string
          description: >
            Filter by state id. National admins may omit this to list all states' entries or set it to filter.
            State admins are always limited to their assigned state; if provided it must equal that state id.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AboutUs" }
  /about-us:
    post:
      security: [{ bearerAuth: [] }]
      summary: Create about-us for a state (one row per state; national/state admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AboutUsCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AboutUs" }
        "409":
          description: "About us already exists for this state"
  /about-us/{id}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get about-us by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AboutUs" }
    patch:
      security: [{ bearerAuth: [] }]
      summary: Update about-us (national/state admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AboutUsPatch" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AboutUs" }
    delete:
      security: [{ bearerAuth: [] }]
      summary: Delete about-us (national/state admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }
  /status/users/{id}/status:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Change user status (hierarchy scoped)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StatusChangeRequest" }
      responses:
        "200": { description: Updated }
  /memberships/me:
    get:
      security: [{ bearerAuth: [] }]
      summary: List current user's memberships
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Membership" }
  /memberships:
    get:
      security: [{ bearerAuth: [] }]
      summary: List all memberships (national/state admin; paginated)
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20 }
        - in: query
          name: status
          schema: { type: string, enum: [ACTIVE, EXPIRED] }
      responses:
        "200":
          description: Paginated list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Membership" }
                  page: { type: integer }
                  pageSize: { type: integer }
                  total: { type: integer }
                  totalPages: { type: integer }
  /memberships/user/{userId}:
    get:
      security: [{ bearerAuth: [] }]
      summary: List memberships for a specific user (admin)
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Membership" }
  /memberships/{id}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get single membership by id (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Membership" }
  /memberships/expire:
    post:
      security: [{ bearerAuth: [] }]
      summary: Trigger membership expiry (national admin; marks all past-due memberships + users as EXPIRED)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  expired: { type: integer }
