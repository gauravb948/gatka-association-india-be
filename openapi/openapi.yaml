    CampLevel:
      type: string
      enum: [NATIONAL, STATE, DISTRICT]
    CampSignupRole:
      type: string
      description: Roles allowed to register (admins excluded)
      enum: [PLAYER, COACH, REFEREE, VOLUNTEER, TRAINING_CENTER]
    CampStateLink:
      type: object
      properties:
        campId: { type: string }
        stateId: { type: string }
    CampDistrictLink:
      type: object
      properties:
        campId: { type: string }
        districtId: { type: string }
    Camp:
      type: object
      properties:
        id: { type: string }
        sessionId: { type: string, nullable: true }
        level: { $ref: "#/components/schemas/CampLevel" }
        name: { type: string }
        venue: { type: string }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        registrationOpensAt: { type: string, format: date-time, nullable: true }
        registrationClosesAt: { type: string, format: date-time, nullable: true }
        allowedSignupRoles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
        audience:
          type: string
          nullable: true
          enum: [PLAYERS, VOLUNTEERS, COACHES, REFEREES, ALL]
        isClosed: { type: boolean }
        createdById: { type: string, nullable: true }
        createdBy:
          nullable: true
          allOf:
            - { $ref: "#/components/schemas/CompetitionCreator" }
        states:
          type: array
          items: { $ref: "#/components/schemas/CampStateLink" }
        districts:
          type: array
          items: { $ref: "#/components/schemas/CampDistrictLink" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CampListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Camp" }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1 }
        total: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    CampCreateBody:
      type: object
      required:
        - name
        - venue
        - stateIds
        - districtIds
        - startDate
        - endDate
        - registrationOpensAt
        - registrationClosesAt
        - allowedSignupRoles
      properties:
        name: { type: string }
        venue: { type: string }
        stateIds:
          type: array
          minItems: 1
          items: { type: string }
        districtIds:
          type: array
          minItems: 1
          items: { type: string }
        startDate: { type: string, description: ISO date or date-time }
        endDate: { type: string }
        registrationOpensAt: { type: string }
        registrationClosesAt: { type: string }
        allowedSignupRoles:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/CampSignupRole" }
      description: >
        Camp level (national/state/district) is inferred from the signed-in admin.
        Geography rules match competitions. Signup is restricted to `allowedSignupRoles`
        and to users whose state/district falls in the camp scope (districts list takes precedence).
        No `description` field — extra properties are rejected.
      additionalProperties: false
    CampPatchBody:
      type: object
      description: >
        At least one property required. If updating geography, send both stateIds and districtIds (each non-empty).
        Cannot edit when isClosed is true. Camp level is not mutable.
        No `description` field — extra properties are rejected.
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string }
        venue: { type: string }
        stateIds:
          type: array
          minItems: 1
          items: { type: string }
        districtIds:
          type: array
          minItems: 1
          items: { type: string }
        startDate: { type: string }
        endDate: { type: string }
        registrationOpensAt: { type: string }
        registrationClosesAt: { type: string }
        allowedSignupRoles:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/CampSignupRole" }
    AttendanceType:
